body:
  text: 唐托言卷九五代王定保撰防慎不至張峴妻顔蕘舍人猶女峴有樊表兄者來自江之南告峴請叩蕘求宰字峴許之而蕘久不應樊謂誑已中心銜之頗切一旦謂峴曰弟卷軸不鄙惡札可以佐弟峴欣然以十餘軸授之皆要切卷子延引逼試每軸頭為札三兩紙而授之峴鬱悒而已房珝河南人太尉之孫咸通四年垂成而敗先是名第定矣無何寫録之際仰泥落擊翻硯瓦汙試紙珝以中表重地祗薦珝一人主事不獲已須應之珝既臨曙更請叩副試主司不諾遂罷李廷璧乾符中試夜於鋪內偶獲襖子半臂一對廷璧起取衣之同鋪賞之曰此得非神授逡巡有一人擒捉大呼云捉得偷衣賊也誤掇惡名華京建州人也極有賦名向遊大梁嘗預公宴因與監軍使面熟及至京師時已登科與同年連鑣而行逢其人於通衢馬上相揖因之謗議喧然後頗至沉棄終太學博士劉纂者髙州劉舍人蛻之子也嗣為文亦不惡乾寧中寒栖京師偶與一醫工為鄰纂待之甚至往往假貸於其人其人即上樞吳開府門徒嗣薛王為大京兆醫工為知柔診脉從容之際言纂之窮且屈知柔甚領覽會試官以解送等第禀於知柔知柔謂纂是開府人來囑斯必開府之意也非解元不可由是以纂居首送纂亦不知其由自是纂落數舉方悟萬計莫能雪之裴筠婚蕭楚公女言定未幾便擢進士羅𨼆以一絶刺之略曰細看月輪還有意信知青桂近嫦娥楊員外乾符中佐永寧劉丞相淮南幕因遊江失足墜水待遣人歸宅取衣久而不至公聞之命以衣授少頃衣至甚華靡問之乃護戎所賜時中貴李全華監揚州公聞之無言後除起居舍人為同列譖改授駕部員外郎由是一生坎軻好知己惡及第邵安石建州人也髙湘侍郎南遷歸闕途次連江安石以所業投獻遇知遂挈至輦下湘主文安石擢第詩人章碣賦東都望幸詩刺之曰懶修珠翠上髙臺眉月連娟恨不開縱使東巡也無益君王自領美人來鄭𨼆者其先閩人徙居循陽因而耕焉少為律賦詞格固尋常咸康末小魏公沆自闕下黜循州佐于時循人稀可與言者𨼆贄謁之沆一見甚慰意自是日與之遊𨼆年少懶於事因傲循官寮由是犯衆怒故責其逋租繫之非所沆聞大怒以錢代𨼆輸官復延之上席未幾沆以普恩還京命𨼆偕行𨼆禀性趦趄沆之門吏家僕靡不惡之往往呼為乞索兒沆待之如一行次江陵𨼆狎遊多不館宿左右爭告沆召𨼆徵辨𨼆以實對沆乃資以財帛左右尤不測也行至商顔詔沆知貢舉時在京骨肉聞沆攜𨼆皆以書止之沆不能捨遂令就䇿試然與諸親約止於此耳暨榜除之夕沆巡廊自呼𨼆者三四矍然頓氣而言曰鄭𨼆崔沆不與了却更有何人肯與之一舉及第然𨼆逺人素無關外名足不跡先達之門既及第而益孤上過關宴䇿蹇出京槃桓淮浙間中和末鄭續鎮南海辟為從事諸同舍皆以無素知聞𨼆自謂有科第志無復答既赴辟同舍皆不睦續不得已致𨼆於外邑居嵗餘又不為宰君所禮會續欲貢士以幕內無名人迎𨼆尸之其宰君謂𨼆恨且久仇之必矣遂於餞送筵置鴆𨼆大醉吐血而卒崔元翰為楊崖州炎所知欲奏補闕懇曰願進士由此獨步場中然不曉呈試先求題目為地崔敖知之旭日都堂始開盛氣白侍郎曰白雲起封中賦敖請退主司於簾中卒愕換之是嵗二崔俱捷好及第惡登科許孟容進士及第學究登科時號錦襖子上著莎衣蔡京與孟容同論曰古人舉事之所難者大則赴湯火次則臨深履薄李少卿又曰􅋵空弮冒白刃聞者靡不膽寒髮竪永為子孫之戒噫危矣彼之得因我也失亦因我也殊不知三百年來科甲之設草澤望之起家簪紱望之繼世孤寒失之其族餒矣世祿失之其族絶矣愧彼為裘之義靦乎析薪之喻方之湯火深薄空弮白刃危在彼矣是知瓜李之嫌薏苡之謗斯不可忘若邵鄭二子單進求名之志先其類雖順坂之勢可惜而揠苗之戒難忘名既靡揚得之不求崔公脅制仁者所不為也許蔡二人所取者道也非為名也莎錦之譬謔浪而已敕賜及第韋保乂咸通中以兄在相位應舉不得特敕賜及第擢入內庭永寧劉相鄴字漢藩咸通中自長春宫判官召入內庭特敕賜及第中外賀緘極衆唯鄆州李尚書種一章最著乃福建韋尚書岫之詞也于是韋佐鄆幕略曰用敕代榜由官入名仰溫樹之煙何人折桂泝甘泉之水獨我登龍禁門而便是龍門聖主而永為座主又曰三十浮名每年皆有九重知己曠代所無相國深所慊鬱蓋指斥太中的也杜升父宣猷終宛陵升有詞藻廣明嵗蘇導給事刺劍州升為軍倅駕幸西蜀例得召見特敕賜緋導入內韋中令自翰長拜主文升時已拜小諫抗表乞就試從之登第數日有敕復前官并服色議者榮之秦韜玉出入大閹田令孜之門車駕幸蜀韜玉已拜丞郎判鹺及小歸公主文韜玉准敕放及第仍編入其年榜中韜玉置書謝新人呼同年略曰三條燭下雖阻文闈數仞墻邊幸同恩地王彥昌太原人家世簪冕推于鼎甲廣明嵗駕幸西蜀恩賜及第後為嗣薛王知柔判官昭宗幸石門時宰臣與學士不及隨駕知柔以京尹判鹺權中書事屬近輔表章繼至切於批答知柔以彥昌名聞遂命權知學士居半載出拜京尹又左常侍大理寺卿為本寺人吏所纍南遷表薦及第乾寧中駕幸三峰殷文圭者攜梁王表薦及第仍列於榜內時楊令公行密鎮維揚奄有宣浙揚汴榛梗久矣文圭家池州之青陽辭親間道至行在無何隨榜為吏部侍郎裴樞宣諭判官至大梁以身事叩梁王王乃上表薦之文圭復擬飾非遍投啓事於公卿間略曰於莬獵食非求尺璧之珍鶢鶋避風不望洪鍾之樂既擢第由宋汴馳過俄為多言者所發梁王大怒亟遣追捕已不及矣然自是屢言措大率皆負心常以文圭為證白馬之誅靡不由此也何澤韶陽曲江人也父鼎容管經略有文稱澤乾寧中隨計至三峰行在永樂崔公即澤之同年丈人也聞澤來舉乃以一絶振之曰四十九年前及第同年唯有老夫存今日殷勤訪我子穩將鬐鬛上龍門時主文與奪未分又會相庭有所阻時崔相公徹恃權即永樂猶子也因之敗於垂成後漂泊關外梁太祖受禪澤假廣南幕職入貢敕賜及第惡得及第于棁舊名韜玉長興相國兄子貴主視之如己子莫不委之家政往往與於關節由是衆議喧然廣明初崔厚侍郎榜貴主力取鼎甲榜除之夕為設庭燎仍為宴具以候同年展敬選內人美少者十餘輩執燭跨乘列於長興西門既而將入辨色有朱衣吏馳報曰胡子郎君未及第胡子棁小字諸炬應聲擲之于地巢冦難後於川中及第依棲田令孜矣或曰棁及第非令孜力後依其門耳髙鍇侍郎第一榜裴思謙以仇中尉關節取狀頭鍇庭譴之思謙回顧厲聲曰明年打脊取狀頭明年鍇戒門下不得受書題思謙自懷士良一緘入貢院既而易以紫衣趨至階下白鍇曰軍容有狀薦裴思謙秀才鍇不得已遂接之書中與思謙求巍峩鍇曰狀元已有人此外可副軍容意㫖謙曰卑吏面奉軍容處分裴秀才非狀元請侍郎不放鍇俯首良久曰然則略要見裴學士思謙曰卑吏便是思謙詞貌堂堂鍇見之改客不得已遂禮之矣黃郁三衢人蚤遊田令孜門擢進士第厯正郎金紫李端曲江人亦受知於令孜擢進士第又為令孜賔佐俱為孔魯公所嫌文德中與郁俱陷刑網芳林十哲今記得者八人沈雲翔亞之弟也林繕改名絢閩人光化中守太常博士鄭玘劉業唐珣吳啇叟以上四人未知其來秦韜玉京兆人父為左軍軍將韜玉有詞藻亦工長短歌有貴公子行曰階前莎毯緑不卷銀龜噴香挽不斷亂花織錦柳撚線粧㸃池臺畫屏展主人功業𫝊國初六親聮絡馳朝車鬭雞走狗家世事抱來皆佩黃金魚却笑書生把書卷學得顔回忍饑面然慕柏耆為人至於躁進駕幸西蜀為田令孜擢用未期嵗官至丞郎判鹽鐵特賜及第郭薰者不知何許人與丞相于都尉向為硯席之交及綜居重地復綰財賦薰不能避譏嫌而樂為半夜客咸通十三年趙隲主文斷意為薰致髙等隲甚撓沮而拒之無名會列聖忌辰宰執已下於慈恩寺行香忽有綵帖子干餘各方寸許隨風散漫有若蜂蝶其上題云新及第進士郭薰公卿覽之相顧囅然因之主司得以黜去咸通中自雲翔輩凡十人今所記者有八皆交通中貴號芳林十哲芳林門名由此入內故也然皆有文字蓋禮所謂君子達其大者逺者小人知其近者小者得之與失乃不能糾别淑慝有之矣語其蛇豕之心者豈其然乎四凶今所記者三陳磻叟者父名岵富有詞學尤溺於內典長慶中嘗注維摩經進上有中㫖令與好官執政謂岵因內道場僧進經頗抑挫之止授少列而已磻叟形質短小長喙疏齒尤富文學自負王佐之才大言騁辨雖接對相公旁若無人復自料非名教之器弱冠度為道士𨽻名於昊天觀咸通中降聖之辰二教論義而黃衣屢奔上小不懌宣下令後輩新入內道場有能折衝浮圖者許以自薦磻叟攝衣奉詔時釋門為主論自誤引涅槃經疏磻叟應聲叱之曰皇帝山呼大慶阿師口稱獻夀而經引涅槃犯大不敬初其僧謂磻叟不通佛書既而錯愕殆至顛墜自是連挫數輩聖顔大悅左右呼萬嵗其日簾前賜紫衣一襲磻叟由是恣其輕侮髙流宿德多患之潛聞上聽云磻叟衣冠子弟不願在冠帔頗思理一邑以自效耳於是中㫖授至德縣令磻叟蒞事未終考秩拋官詣闕上封事通義劉公引為羽翼非時召對數刻磻叟所陳凡數十節備究時病復曰臣請破邊瑊家可以贍軍一二年上問邊瑊何人對曰宰相路巖親吏既而大為巖恚怒翌日敕以磻叟誣罔上聽訐斥大臣除名為民流愛州磻叟雖至顛蹶輒不敢以其道自屈素有重墜之疾厯聘藩后率以肩輿造墀廡所至無不仰止及巖貶磻叟得量移為鄧州司馬時屬廣明庚子之後劉巨容起徐將得襄陽不能磻叟待以巡屬一州佐耳磻叟㳂漢南下中途與巨容幕吏書云已出無禮之鄉漸及逍遙之境巨容得之大怒遣步健十餘輩移牒潭鄂追捕磻叟時天下喪亂無人為隄防既而為卒伍所凌全家泝漢至賈塹後門三十餘口無噍類矣劉子振蒲人也頗富學業而不知大體尤好凌轢同道詆訐公卿不恥干索州縣稍不如意立致寒暑以至就試明庭稠人廣衆罕有與之談者居守劉公主文嵗患舉子納卷繁多榜云納卷不得過三軸子振納四十軸因之大掇凶譽子振非不自知蓋不能抑壓耳乾符中官為博士三年釋奠禮畢令學官講書宰臣已下皆與聽焉時子振講禮記陸鸞周易李沼者封川相猶子也其妻乃董常侍禹之女也大順中邠州節度使尚父王行瑜外族董氏以舅事於禹沼樂遊行瑜之門行瑜呼沼李郎會與計偕僕馬生生之具皆行瑜所致沼負是大恣未幾按甲來覲諷天子誅大臣縉紳間重足一跡沼出入行瑜之門頗有得色及行瑜敗詔捕沼沼亡命秦隴論曰才者璞也識者工也良璞授於賤工器之陋也偉才任於鄙識行之缺也由是立身揚名進德修業茍昧乎識未有一其行藏者也矧乃時之不來命或多蹇善惡蔽於反已得失幸於尤人豈不驟達終危雖榮是辱非夫克明躁靜之本洞究存亡之域臨財無茍得臨難無茍免而能索身於坦夷者未之有也揚子雲曰治亦鳳也美才髙識其唯君子歟唐托言卷九
