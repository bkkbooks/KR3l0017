body:
  text: 唐托言小說家類一雜事之屬提要臣等謹案唐托言十五卷五代王定保撰舊本不題其里貫其序稱王溥為從翁則溥之族也陳振孫書録解題謂定保為吳融之壻光化三年進士喪亂後入湖南五代史南漢世家稱定保為雍管巡官遭亂不得還劉隱辟置幕府至劉龑號號之時尚在其所終則不得而詳矣考定保登第之嵗距朱溫篡唐僅六年又序中稱溥為丞相則是書成於周世宗顯德元年以後故題唐國號不復作內詞然定保生於咸通庚寅至是年八十五矣是書蓋其暮年所作也同時南唐鄉貢士何晦亦有唐托言十五卷與定保書同名今晦書未見而定保書刻於商氏稗海者刪削大半殊失其真此本為松江宋賓王所録末有跋語稱以汪士鋐本校正較稗海所載特為完備近日揚州新刻即從此本録出惟是朝公武讀書志稱是書分六十三門而此本實一百有三門數目差舛不應至是豈商維濬之前已先有刪本耶是書述有唐一代貢舉之制特詳多史志所未及其一切雜事亦足以覘名場之風氣驗士習之淳澆法戒兼陳可為永鑑不似他家雜録但記異聞己也據定保自述蓋聞之陸扆吳融李渥顔蕘王溥王渙盧延讓楊贊圖崔籍若等所談云乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:90197e38729580b55d6fd9a2bc9b3432dfcc658249e9f9c41cc5c3aa451b7773
