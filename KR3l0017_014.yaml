body:
  text: 唐托言卷十四五代王定保撰主司稱意天寶十二載禮部侍郎楊浚四榜共放一百五十人後除左丞至德二年駕臨岐山右補闕兼禮部員外薛雍下二十一人後至大厯二年拜禮部侍郎聨翩四榜共放八十人貞元二年禮部侍郎鮑防帖經後改京兆尹刑部侍郎元和十一年中書舍人權知貢舉李逄吉下及第三十三人試策後拜相令禮部尚書王播署榜其日午後放榜元和十五年閏正月十五日太常少卿知貢舉李建下二十九人至二月二十九日拜禮部侍郎天祐元年楊涉行在陕州放榜後大拜二年張文蔚東洛放榜後大拜主司失意大厯十四年改元建中禮部侍郎令狐峘下二十二人及第時執政間有怒薦記不得勢擬傾覆峘惶恐甚因進其私書上謂峘無良放榜日竄逐並不得與生徒相見後十年門人田敦為明州刺史峘量移本州别駕敦始陳謝恩之禮長慶元年二月十七日侍郎錢徽下三十三人三月二十三日重試落第十人徽貶江州刺史㑹昌六年陳商主文以延英對見辭不稱㫖改授王起咸通四年蕭倣雜文榜中數人有故放榜後發覺責受蘄州刺史主司其年二月十三日得罪貶蘄州刺史五年五月量移虢略中書舍人知制誥宇文瓚制敕朕體至公以御極推至理以臨人舉必任才黜皆由過二者之命吾何敢私中散大夫守在散騎常侍權知禮部貢舉上柱國賜紫金魚袋蕭倣蚤以藝文薦升華顯清貞不磷介節無徒居多正直之容動有休嘉之稱近者擢司貢籍期盡精研既紊官常頗興物論經詢大義去留或致其紛拏榜掛先場進退備聞其差互且昧泉魚之察徒懷氷蘗之憂豈可尚列貂蟬復延騎省俾分郡牧用示朝章勿謂非恩深宜自勵可守蘄州刺史散官􅈴賜如故仍馳驛赴任蕭倣蘄州刺史謝上兼知貢舉敗闕表臣某言臣謬掌貢闈果兹敗失上負聖奬下乖人情實省已以兢慙每自咎而惶灼猶賴陛下猥矜拙直特貸刑書不奪金章仍付符竹荷恩宥而感戀奉嚴譴以奔馳不駐羸驂繼持舟棹臣二月十三日當日于宣政門外謝訖便辭進發今月一日到任上訖臣誠惶誠懼頓首頓首臣性禀朴愚材昧機變皆為叨據果竊顯榮一心惟知效忠萬慮未嘗念失是以頃升諌列已因論事去官後忝瑣闈亦緣舉職統斾身流嶺外望絶中朝甘于此生不到上國伏遇陛下臨御大寶恭行孝思詢以舊臣遍霑厚渥臣逺從海嶠首還闕廷才拜丹墀俄捧紫詔任掄材于九品位超冠于六曹家與國而同歸官與職而俱盛常思惕厲粗免悔尤已塵銓衡復忝貢務昨雖有過今合具陳臣伏以朝廷所大者莫過文柄士林所重者無先詞科推公過即怨讟並生行應奉即語言皆息為日雖久近嵗轉難如臣孤微豈合操剸徒以副陛下振用明時至公是以不聽囑論堅收沉滯請托既絶求瑕者多臣昨選擇實不屈人雜文之中偶失詳究扇衆口以騰毁致朝典以指名緘深懇而未得敷陳奉詔命而須乘郵𫝊罷逺藩赴闕還鄉國而只及一年自近侍謫官歷江山而又三千里泣别骨肉愁涉險艱今則已逹孤城唯勤郡政緝綏郭邑訓整里閭必使獄絶寃人巷無橫事峻法鈐轄于狡吏寬𢎞撫育於疲農粗立微勞用贖前過伏乞陛下特開睿鑒俯察愚衷臣前後黜責多因于奉公秉持直誠常逢于黨與分使如此時亦自嗟寫肝膽而上告明君希衰殘而得還帝里豈望復升榮級更被寵光願受代于蘄春遂間散于輦下臣官為牧守不同藩鎮謝上之後他表無因達天聽而知在何時備煩詞而併陳今日馳魂執筆流血拜章形神雖處于遐陬夢寐尚馳於班列臣無任感恩惶恐涕泣望闕屏營之至謹差軍事押衙某奉表陳謝以聞倣與浙東鄭商綽大夫雪門生薛扶狀某昨者出官之由伏計盡得于邸吏久不奉榮問惶懼實深某自守孤直蒙大夫眷奬最深輒欲披陳其事略言首尾冀當克副虛襟鑒雪幽抱伏以近年貢務皆自閣下權知某叨歷清崇不掌綸誥去冬遽因銓衡叨主文柄珥貂載筆忝幸實多遂將匪石之心冀伸藻鏡之用壅遏末俗蕩滌訛風刈楚于庭得人之舉而騰口易唱長舌莫箝吹毛豈惜其一言指頰何啻于十手既速官謗皆由拙直竊以常年主司親屬盡得就試某敕下後榜示南院外內親族具有約勒並請不下文書斂怨之語日已盈庭復禮部舊吏云常年例得明經一人某面責其事即嚴釐革然皆陰蓄狡恨求肆蠧言致雜文之差互悉羣吏之搆成失於考議敢不引過又常年榜帖並他人主張凡是舊知先當垂翅靈蛇在握棄而不收璞鼠韜懷疑而或取致使主司脅制于一時遺恨遂流于他日今春此輩亦有數人皆朝夕相門月旦自任共相掎角直索文書某堅守不聽惟運獨見見在子弟無三舉門生舊知才數人推公擢引且既在門館日夕即與子弟不生為輕小之徒望風𫝊說曰筆削重事閨門得專某但不欺知白之誠豈畏如簧之巧頃年赴廣州日外生薛廷望薦一李仲將外生薛扶秀才云負文業窮竒嶺嶠到鎮日相見之後果有詞藻久與宴處端厚日新成名後人傳是蕃夷外親嶺南巨富發身財賂委質科名扶即薛謂近從兄弟班行內外親族絶多嶺表之時寒苦可憫曾與月給虛說蕃商據此謗言豈粗相近况孔振是宣父胄緒韓綰即文公令孫蘇鷀故奉常之後雁序雙髙而風埃久處栁告是栁州之子鳳毛殊有而名字陸沉其餘四面搜羅皆有久居藝行之士煩於簡牘不敢具載某裁斷自己實無愧懷敦朝廷厚風去士林時態此志惶撓豈憚悔尤今則公忠道消奸邪計勝衆情猶有惋嘆深分却無憫嗟何直道而遽不相容豈正德而亦同浮議久猜疑悶莫喻尊崇幸無大故之嫌勿信小人之論粗陳本末希存舊知臨紙寫誠含毫增歎時垂鑒宥無輕棄遺幸甚乾寧二年崔凝榜放貶合州刺史先是李滚附於中貴既憤退黜百計推之上亦深器滚文學因之藴怒密㫖令內人于門搜索懷挾至于巾履靡有不至唐托言卷十四
