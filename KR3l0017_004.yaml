body:
  text: 唐托言卷四五代王定保撰節操裴晉公質狀眇小相不入貴既屢屈名場頗亦自惑㑹有相者在洛中大為搢紳所神公時造之問命相者曰郎君形神稍異于人不入相書若不至貴即當餓死然今則殊未見貴處可别日垂訪勿以蔬糲相鄙候旬日為郎君細看公然之凡數往矣無何阻朝客在彼因退逰香山佛寺徘徊廊廡之下忽有一素衣婦人致一緹䌌於僧伽和尚欄楯之上祈祝良久復取茭擲之叩頭瞻拜而去少頃度方見其所致意彼遺忘既不可追必料其再至因為收取躊躇至暮婦人竟不至度不得已攜之歸所止詰旦復攜至彼時寺門始開俄覩向者素衣疾趨而至逡巡撫膺惋嘆若有非橫度從而訊之婦人曰新婦阿父無罪被繫昨告人假得玉帶二犀帶一直千餘緡以遺津要不幸遺失於此今老父不測之禍無所逃矣度憮然復細詰其物色因而授之婦人拜泣請留其一度不顧而去尋詣相者相者審度顔色頓異大言曰此必有隂德及物此後前途萬里非某所知也再三詰之度偶以此言之相者曰秪此便是隂功矣他日無相忘勉旃勉旃度果位極人臣盧大郎補闕盧名上字與傼家諱同下字曰暉升平鄭公之甥也暉少孤長於外氏愚常誨之舉進士咸通十一年初舉廣明庚子歲遇大寇犯闕竄身南服時外兄鄭續鎮南海暉向與續同庠序續仕州縣官暉自號白衣卿相然二表俱為愚鍾愛爾來未十稔續為節行將暉乃窮儒復脫身虎口挈一囊而至續待之甚厚時大駕幸蜀天下沸騰續勉之出處且曰人生幾何茍富貴可圖何須一第耳暉不答復請賓佐誘激者數四復虛右席以待暉暉因曰大朝設文學之科以待英俊如暉之能否焉敢期於叨餮然聞昔舅氏所朂常以一第見勉今舊館寂寥奈何違夙昔之約茍白衣沒世亦其命也若見利改圖有死不可續聞之加敬自是龍鍾場屋復十許歲大順中方為𢎞農公所擢卒於右衮孫泰山陽人少師皇甫穎守操頗有古賢之風泰妻即姨妹也先是姨老矣以二子為託曰其長損一目汝可娶其女弟姨卒泰娶其姊或詰之泰曰其人有廢疾非泰不可適衆皆伏泰之義常於都市遇鐵燈臺市之而命洗刷即銀也泰亟往還之中和中將家于義興置一别墅用緡錢二百千既半授之矣泰逰吳興郡約回日當詣所止居兩月泰回停舟途步復以餘資授之俾其人他徙于時覩一老嫗長慟數聲泰驚悸召詰之嫗曰老婦常逮事君姑于此子孫不肖為他人所有故悲耳泰憮然久之因紿之曰吾適得京書已别除官固不可駐此也所居且命爾子掌之言訖解維而逝不復返矣子展進士及第入梁為省郎論曰范宣之三立德居其首夫子之四科行在其先矧乃五常者總之於仁百慮者試之於利禍福不能回至德貧富不能窺至仁夫炯戒之倫而窮達不侔者其惟命與茍屆諸道又何窮達異致矣與恩地舊交劉虛白與太平裴公蚤同硯席及公主文虛白猶是舉子試雜文日簾前獻一絶句曰二十年前此夜中一般燈燭一般風不知歲月能多少猶著麻衣待至公孟棨年長于小魏公放榜日棨出行曲謝沆泣曰先輩吾師也沆泣棨亦泣棨出入場籍三十餘年長孫籍與張公舊交公兄呼籍公常諷其改圖籍曰朝聞道夕死可矣師友李華以文學名重于天寶末至德中自前司封員外起為相國李梁公峴從事檢校吏部員外時陳少遊鎮淮陽尤仰公之名一旦城門吏報華入府少遊大喜簪笏待之少頃復曰云已訪蕭公功曹矣即穎士也廬江何長師趙郡李華范陽盧東美少與韓衢為友江淮間號曰四䕫裴佶字𢎞正宰相耀卿之孫吏部侍郎綜之子卒於工部尚書鄭餘慶請先行朋友服私諡曰貞子曰泰章喬潭天寶十三年及第任陸渾尉時元魯山客死是邑潭減俸禮葬之復恤其孤李華三賢論云潭昂之孫有古人風李華稱元德秀張友略志如道德行如經術貞元十二年李贄以大宏詞振名與李敏同姓同年同登第又同甲子及第時俱二十五歲又同門贄嘗答行敏詩曰因緣三紀異契分四般同隴西李舟與齊相國映友善映為將相舟為布衣而舟致書於映以交不以貴也時映左遷於䕫舟書曰三十三官足下近年以來宰臣當國多與故人禮絶僕以禮處足下則足下長者僕心未忍欲以故人處足下則慮悠悠之人以僕為詭欲修書逡巡至今忽承足下出守䕫國於蒼生之望則為不幸為足下謀之則名遂身退斯又為佳僕昧時者謹以為賀但鄱陽雲安道阻且長音塵寂蔑永以增嘆僕所疾沈痼方率子弟力農為世疏矣足下亦焉能不疏僕耶足下素達僕所知之其於得喪固怡如也然朝臣如足下寡矣明王豈當不察之耶惟强飯自愛珍重珍重李華祭蕭穎士文維乾元三年二月十日孤子趙郡李華以清酌之奠敬祭于亡友故揚府功曹蘭陵蕭公之靈嗚呼茂挺平生相知情體如一歲月之别俄成古今天乎喪豫此痛何極華釁罰深重艱難所鍾殊方永慕觸目號裂途窮易感况哭故人以足下才惟挺生名蓋天下道孤命屈淪厄終身避亂全潔忠也冒危遷祔孝也有王佐之才先師之訓而沒於道路何負於天乎痛哉華疇昔之歲幸忝周旋足下不棄愚劣一言契合古稱管鮑今則蕭李有過必規無文不講知名當世實類無人循環往復何日忘此存實等泣血千里羇旅相依聞其一哀心骨皆斷夫痛之至者言不能宣雖欲寄詞秪益填塞茂挺君其降靈尚饗韓文公瘞硯文隴西李元賓始從進士貢在京師或貽之硯四年悲歡否泰未嘗廢用凡與之試藝春官實二年登上第行于褒谷間役者誤墜之地毁焉乃匣歸埋於京師里中昌黎韓愈其友人也贊而識之土乎成質陶乎成器復其質非生死類全斯用毁不忍棄埋而識之仁之義硯乎硯乎瓦礫異杜工部交鄭廣文嘗以詩贈䖍曰諸公衮衮登臺省廣文先生官獨冷甲第紛紛厭粱肉廣文先生飯不足先生有道出羲皇先生有才過屈宋德尊一代常壈坎名垂萬古知何用杜陵野老人更嗤短褐身窄鬢如絲日糴太倉五升米時赴鄭老同襟期得錢則相覔沽酒不復疑忘形到爾汝痛飲真我師清夜沈沈動春酌燈前細雨簷花落但覺高歌有鬼神焉知餓死填溝壑相如逸才親滌器子雲識字終投閣先生蚤賦歸去來石田茅屋荒蒼苔儒術于我何有哉孔􅉌盜跖俱塵埃不須聞此意慘淡生前相遇且銜杯又曰廣文到官舍繫馬堂階下醉則騎馬歸頻遭官長罵垂名三十年坐客寒無氊賴得蘇司業時時與酒錢及䖍即世甫賦八哀詩其一章誄䖍也崔羣字敦詩貞元八年陸贄下及第與韓愈為友羣佐宣州幕時愈與羣書論交略云考之百行而無瑕尤窺之閫奧而不見畛域明白淳粹輝光日新者唯吾崔君一人僕愚陋無所知曉然聖賢之書無所不讀其精粗巨細出入晦明雖不盡識抑不可謂不涉其源者也以此而推之而度之誠知足下出羣拔萃無謂僕從何而得也劉駕與曹鄴為友俱攻古風詩鄴既擢第而不即出京俟駕成名同去果諧所志毛傑與盧藏用書月日雲夢子毛傑謹致書于盧公足下傑聞君子所貴者道也所好者才也故才髙則披襟而論翰墨道狎則言事而致談笑何必雞鳴狗盜始資僥幸之能簞食瓢飲不顧清虛之用自公立名休代博物多能帝曰爾諧擢為近侍所以從容禁省出入鎖闈忠弼在躬優柔荐及傑時在草莽運厄窮愁思折俎而無因嗟掃門而不逮豈知羣邪遘逆聨聲嗷嗷紫奪我朱逺詣惡土賴公神色自若心行不渝餌芝术以養間坐煙篁而收思傑梁鴻逺旅閔仲未歸留戀德音徘徊失路互鄉童子當願接於宣尼蘇門先生竟未言於阮籍公於傑者如彼僕於公者若此百年朝夕何事惜于交逰四海兄弟何必輕於行路賈生不云乎達人大觀物無不可小智自私賤彼貴我况公拂衣髙尚習靜間局世事多捐尤精道意豈有自私而已無大觀者哉倘能憐雲壑奬無知慜張良小子說鴻蒙之偈遺黃石之書虛往實歸霑霧露之微潤裒多益寡落丘山之一毫則知足下之眷深焉小人之慶畢矣盧答毛書毛子足下勤身訪道不毒氛瘴裹糧鬼門放蕩雲海有足多矣一昨不遺猥辱書札期我遐意詢子道真使人慚愧也僕知之矣士之生代則有𡨕志深蔽滅木穹窒鍊九還以咽氣味三秀以詠言固將養蒙全理不以能鳴夭性則其上也義感當途說動時主懷全德以自達裂山河以取貴又其次也至于誠信不申忠孝胥缺獨禦魑魅永投豺虎無面目以可數椎心膺以問天斯最下也僕在壯年嘗慕其上先貞後黷卒罹憂患負家為業置身于此何顔復講道德哉雖然少好立言亟聞長者之說老而彌篤猶憐薄暮之晷加我數年庶無大過覽莊生鵾鵬之喻則乾坤龍馬之㫖可好矣培風運海則六九之源無差矣隳聰黜明則洗心藏密有由矣開卷獨得恬然㑹真不知寰宇之寥廓不知生之與謝斯亦曖昧所守何必為是倘足下起豫指掌而說今之𨼆几不亦樂乎道在稊稗理無相阻曷為區區過勞按劍也頃風眩成瘵不復屬筆力此還答無所銓次淹遲之期庶不我責盧藏用頓首方干師徐凝干常刺凝曰把得新詩草裏論反語曰村裏老李頻師方千後頻及第詩僧清越贈干詩云弟子已得桂先生猶灌園韓文公名播天下李翺張籍皆升朝籍北面師之故愈答崔立之書曰近有李翺張籍者從豫學文翺與陸修員外書亦曰韓退之之文非兹世之文也古之文也其人非兹世之人古之人也後愈自潮州量移宜春郡郡人黃頗師愈為文亦振大名頗常覩盧肇為碑版則唾之而去案實録愈與人交其有淪謝皆能恤其孤復為畢婚嫁如孟東野張籍之類是也李義山師令狐文公呼小趙公為郎君於文公處稱門生氣義郭代公年十六入太學與薛稷趙彥昭為友時有家信至寄錢四十萬以為學糧忽有一縗服者扣門云五代未葬各在一方今欲同時舉大事乏於資財聞公家信至頗能相濟否公即命以車一時載去略無存者亦不問姓氏深為趙薛所誚元振怡然曰濟彼大事亦何誚焉其年為糧食斷絶竟不成舉熊執易赴舉行次潼關秋霖月餘滯於逆旅俄聞鄰店有一士吁嗟數四執易潛伺之曰前堯山令樊澤舉制科至此馬斃囊空莫能自進執易造焉遽輟所乘馬倒囊濟之執易其年罷舉澤明年登科代公為通泉縣尉掠賣千餘人以供過客天后異之召見大愜意㫖并口占古劍一篇以進上竒之命繕寫當直學士楊虞卿及第後舉三篇為校書郎來淮南就李鄫親情遇前進士陳商啓護窮窘公未相識問之倒囊以濟李北海年十七攜三百縑就納國色偶遇人啓護倒囊濟之許棠久困名場咸通末馬戴佐大同軍幕棠往謁之一見如舊相識留連數月但詩酒而已未嘗問所欲一旦大㑹賓客命使者以棠家書授之棠驚􅌓莫知其來啓緘即知戴潜遣一介恤其家矣贊曰孰以顯亷臨財不茍孰以定交𢎞道則久窮乃益堅達以胡有無得無喪天長地久君子行之小人則否唐托言卷四
