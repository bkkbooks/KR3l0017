front:
  text: 唐托言跋唐以進士為重托言所載最為詳備刋之宜春郡齋與好事者共之嘉定辛未重午日柯山鄭昉跋唐重科目舉措分殊有國史未具析者藉王氏托言小大畢識後代得聞其遺制奈流傳者寡又為末學所刪存不及半是編一十五卷獲之京師慈仁寺集乃定本也卷尾有柯山鄭昉跋稱嘉定辛未刋於宜春郡吳江徐電發近録棠村相國所藏與此本略同當就其校讐訛字發雕焉朱彞尊竹垞跋托言足本十五卷從朱竹垞翰林借鈔視稗海所刻多什之五唐人説部流傳至今者絶少此書洎封氏聞見記皆祕本可貴重當有好事者共表章之王士禎阮亭跋
