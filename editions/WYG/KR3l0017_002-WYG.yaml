body:
  text: 唐摭言卷二五代王定保撰京兆府解送神州解送自開元天寶之際率以在上十人謂之等第必求名實相副以滋教化之源小宗伯倚而選之或至渾化不然十得其七八茍異于是則往往牒貢院請落由暨咸通乾符則為形勢吞嚼臨制近同及第得之者互相誇詫車服侈靡不以為僭仍期集人事貞實之士不復齒所以廢置不定職此之由其始末録之如左元和元年登科記京兆等第牓序天府之盛神州之雄選才以百數為名等列以十人為首起自開元天寶之世大厯建中之年得之者摶躍雲衢階梯蘭省即六月冲霄之漸也今所𫝊者始于元和景戌嵗次序名氏目曰神州等第録廢等第開成二年大尹崔珙判云選文求士自有主司州府送名豈合差等今年不定高下不鎖試官既絶猜嫌暫息浮競差功曹盧宗囘主試除文書不堪送外便以所下文狀為先後試雜文後重差司録侯雲章充試官竟不列等第明年崔珙出鎮徐方復置等第大中七年韋澳為京兆尹牓曰朝廷將裨教化廣設科場當開元天寶之間始専明經進士及貞元元和之際又益以薦送相高當時唯務切磋不分黨甲絶僥倖請託之路有推賢讓能之風等列標名僅同科第既為盛事固可公行近日以來前規頓改互争强弱多務奔馳定髙卑于下第之初决可否于差肩之日曾非考覈盡繫經營奥學雄文例舍于貞方寒素增年矯貌盡取于朋比羣强雖中選者曾不足云而争名者益熾其事澳叨居畿甸合貢英髦非無藻鑑之心懼有愛憎之謗且李膺以不察孝㢘去任胡廣以輕舉茂才免官况在管窺實難裁處况禮部格文本無等第府解不合區分其今年所合送省進士明經等並以納䇿試前後為定不在更分等第之限置等第乾符四年崔涓為京兆尹復置等第差萬年縣尉公乘億為試官試火中寒暑退賦殘月如新月詩李時文公孫韋硎沈駕羅𨼆劉纂倪曙唐駢周繁池人善賦呉廷𨼆賈涉其年所試八韻涉擅場而屈其等第府元落郭求元和元年楊正舉六年唐炎八年髙釴九年平曾長慶二年貶崔伸寶厯二年罷韋鋋太和二年鄭從讜開成二年韋瑑乾寜二年等第末為狀元李固言元和七年等第罷舉劉隲田鬯並元和七年張傒韋元佐並元和八年孟夷十二年韋璟十四年辛諒崔殻薛渾並長慶元年韋澌李餘並二年郭崖三年李景方盧鎰並寳厯元年韋敖二年元道韋衍並太和二年殷恪劉筠並八年崔濆開成二年胡澳樊京並三年温岐四年蘇俊五年韓宁㑹昌二年李謩韓肱並三年魏鐐孫璵並四年韋硎沈駕羅隱周繁並乾符四年為等第後久方及第韋力仁趙蕃黄頗並十三年劉纂後二十一年論曰孟軻言遇不遇命也或曰性能則命通以此循彼匪命從於性耶若乃大者科級小者等列當其角逐文場星馳解試品第潛方於十哲春闈斷在於一鳴奈何取舍之源殆不踵此或解元永黜或髙等尋休黄頗以洪奥文章蹉跎者一十三載劉纂以平漫子弟汨沒者二十一年温岐濫竄於白衣羅𨼆負􅁈於丹桂由斯言之可謂命通性能豈曰性能命通者歟茍怫於是何姦宄亂常不有之矣京兆府解試比同禮部三場試巢冦之後並只就一場耳海述解送荆南解比號天荒大中四年劉蜕舍人以是府解及第時崔魏公作鎮以破天荒錢七十萬資蜕蜕謝書畧曰五十年來自是人廢一千里外豈曰天荒争解元叩貢院門求試後到附同華解最推利市與京兆無異若首送無不捷者元和中令狐文公鎮三峯時及秋賦牓云特加置五場盖詩謌文賦帖經為五場常年以清要書題求薦者率不減十數人其年莫有至者雖不逺千里而來聞是皆寖去唯盧𢎞正尚書獨詣華請試公命供帳酒饌侈靡於往時華之寄客畢縱觀於側𢎞正自謂獨步文場公命日試一場務精不務敏也𢎞正已試兩場而馬植下解植將家子弟從事輩皆竊笑公曰此未可知既而試登山採珠賦畧曰文豹且異于驪龍採斯疏矣白石又殊於老蚌剖莫得之公大服其精當遂奪𢎞正解元後𢎞正自丞郎將判鹺俄而為植所據𢎞正以手札戲植曰昔日華元已􅇜毒手今來鹺務又中老拳復日試破竹賦咸通末永樂崔侍中廉問江西取羅鄴為督郵鄴因主解試時尹璞自逺來求計偕璞有文而使氣鄴挾私黜之璞大恚怒疏鄴云羅鄴諱則則可知也鄴父則為餘杭鹽鐵小吏白樂天典杭州江東進士多奔杭取解時張祐自負詩名以首􅃣為己任既而徐凝後至㑹郡中有宴樂天諷二子矛楯祐曰僕為解元宜矣凝曰君有何佳句祐曰甘露寺詩有日月光先到山河勢盡來又金山寺詩有樹影中流見鐘聲兩岸聞凝曰善則善矣奈無野人句云千古長如白練飛一條界破青山色祐愕然不對於是一座盡傾凝奪之矣大中中紇干峻與魏􅀈争府元而紇干屈居其下翌日􅀈暴卒時峻父方鎮南海由是為無名子所謗曰離南海之日應得數斤當北闕之前未消一捻因此峻兄弟皆罷舉張又新時號張三頭進士狀頭宏詞勅頭京兆解頭國朝自廣明庚子之亂甲辰天下大荒車駕再幸岐梁道殣相望郡國率不以貢士為意江西鍾傅令公起於義聚奄有疆土充庭述職為諸侯表式而乃孜孜以薦賢為急務雖州里白丁片文隻字求貢於有司者莫不盡禮接之至於考試之辰設㑹供帳甲於治平行鄉飲酒之禮常率賓佐臨視拳拳然有喜色復大㑹以餞之筐篚之外率皆資以桂玉解元三十萬解副二十萬海送皆不減十萬垂三十載此志未嘗稍怠時舉子有以公卿闗節不逺千里而求首薦者歳常不下數輩合淝李郎中羣始與楊衡符載等同𨼆廬山號山中四友内一人不記姓名先是封川李相遷閣長㑹有名郎出牧九江郡者執辭之際屢以文柄迎賀於公公曰誠如所言廬山處士四人儻能計偕當以到京先後為齒既而公果主文於是擁旌旗造柴闗激之而笑時三賢皆膠固唯合淝公年十八矍然曰及其成功一也遂束書就貢比及京師已鎖貢院乃搥院門請引見公問其所止答云到京後時未遑就館合淝神質瓌秀主司為之動容因曰不為作狀頭便可延於吾廬矣楊衡後因中表盜衡文章及第詣闕尋其人遂舉亦及第或曰見衡業古調詩其自負者有一一鶴聲飛上天之句初遇其人頗憤怒既而問曰其一一鶴聲飛上天在否前人曰此句知兄最惜不敢輒偷衡笑曰猶可恕符載後佐李隲為江西副使失意去從劉闢已上李羣與揚衡符載等事一節事意年代前後不相接差互尤甚髙貞公郢就府解後時試官别出題目曰沙洲獨鳥賦即援筆而成曰鴥有飛鳥在河之洲一飲一啄載沈載浮賞心利涉之地浴質至清之流其年首送得失以道李翺與弟正辭書貞元末正辭取京兆解掾不送翺故以書勉之其書曰知汝京兆府取解不得如其所懐念勿在意凡人之窮達所遇猶各有時爾何獨至於賢丈夫而反無其時哉此非吾人之所憂也吾所憂者何畏吾之道未到於古人之際耳其心既自以為到且無謬則吾何往而不得所樂何必與夫時俗之人同得失憂喜而動於心乎借如用汝之所知分為十焉用其九學聖人之道而和其心使其餘者以與時進退俯仰如可求也則不啻富且貴也如非吾力也雖盡用其十秪益動其心爾安能有所得乎汝勿信人號文章為一藝夫所謂一藝者乃時俗所好之文或有盛名於近代者是也其能到古人者則仁義之詞也惡得一藝而名之哉仲尼孟軻没千餘歳矣吾不見其人能知其聖且賢者以吾讀其詞而得之者也後來者不可欺安知其讀吾詞也而不知吾心之所存乎亦未可誣也夫性於仁義者未見其無文也有文而能到者吾未見其不力於仁義也由仁義而後文者天性也由文而後仁義者習也由誠明之必相依爾貴與富在乎外者也吾未能知其有無也非吾求而能至者也吾何愛而屑屑於其間哉仁義與文章生乎内者也吾知其有也吾能求而充之者也吾何懼而不為哉汝雖天性過於人然而未能浩浩於其心吾故書其所懐以張汝且以樂言吾道云爾恚恨太和初李相回任京兆府㕘軍主試不送魏相公謩深銜之㑹昌中回為刑部侍郎謩為御史中丞嘗與次對官三數人候對於閤門謩曰某頃歲府解䝉明公不送何幸今日同集於此囘應聲答曰經上呼如今也不送謩為之色變益懐憤恚後囘謫牧建州謩大拜囘有啟狀謩悉不納既而囘怒一衙官決杖勒停建州衙官能庇徭役求𨽻籍者所費不下數十萬其人切恨停廢後因亡命至京師接時相訴寃諸相皆不問㑹亭午憩於槐隂顔色憔悴傍人察其有私詰之其人具述本意於是誨之曰建陽相公素與中書相公有隙子盍詣之言訖魏公導騎自中書而下其人常懐文狀即如所誨望塵而拜導從問對曰建州百姓訴寃公聞之倒持麈尾敲檐子門令止及覧狀所論事二十餘件第一件取同姓之女入宅於是為魏相極力鍛成大獄時李相已量移鄧州刺史行次九江遇御史鞫却迴建陽竟坐貶撫州司馬終于貶所盧吉州肇開成中就江西解試為試官末送肇有啟謝曰巨鼇屓贔首􅃣蓬山試官謂之曰某昨限以人數擠排雖獲申展深慙名第奉凂焉得翻有首冠蓬山之謂肇曰必知明公垂問大凡頑石處上巨鼇戴之豈非首冠耶一座聞之大笑華良夫常為京兆解不送良夫以書讓試官曰聖唐有天下垂二百年登進士科者三千餘人良夫之族未有登是科者以此慨嘆憤惋從十歳讀書學為文章手寫之文過於千卷王泠然與御史髙昌宇書曰僕之怪君甚久矣不憶往日任宋城縣尉乎僕稍善文章每蒙提奬勤勤見遇又以齊甿叨承恩顧銘心在骨復聞升進不出臺省當為風波可望故舊不遺近者伏承皇皇者華出使江外路次於宋依然舊逰門生故人動有十輩蒙問及者衆矣未嘗言泠然明公縱欲髙心不垂半面豈不畏天下窺公侯之淺深與著綠袍乘騘馬蹌蹌正色誰敢直言僕所以數日伺君望塵而拜有不平事欲圖於君莫厭多言而彰公短也先天年中僕雖幼小未閑聲律輒參舉選公既明試量擬㸃額僕之枉落豈肯緘口是則公之激僕僕豈不知公之辱僕僕終不忘其故亦上一紙書蒙數遍讀重相摩奬道有性靈云某來年掌試仰取一名於是逡巡受命匍匐而歸一年在長安一年在洛下一年坐家園去年冬十月得送今年春三月及第往者雖蒙公不送今日亦自致青雲天下進士有數自河以北唯僕而已光華籍甚不是不知君須稍垂後恩雪僕前恥若不然僕之方寸别有所施何者故舊相逢今日之謂也僕之困窮如君之往昔君之未遇似僕之今朝因斯而言相去何逺君是御史僕是詞人雖貴賤之間與君隔闊而文章之道亦謂同聲而不可以富貴驕人亦不可以禮義見隔且僕家貧親老常少供養兄弟未有官資嗷嗷環堵菜色相看貧而賣漿值天冷今冬又属停選試遣僕為御史君在貧途見天下文章精神氣調得如王子者哉實能憂其危拯其弊今公之富貴亦不可多得意者望御史今年為僕索一婦明年為留心一官幸有餘力何惜些些此僕之宿憾口中不言君之此恩頂上相戴儻也貴人多忘國士難期使僕一朝出其不意與君並肩臺閣側眼相視公始悔而謝僕僕安能有色於君乎僕生長草野語誠觸忤并詩若干首别來三日莫作舊眼相看山東布衣不識忌諱泠然頓首論曰子曰不怨天不尤人下學而上達又曰求己不責於人君子振跡發身咸覬善地反之於己何得喪之不常望之於人則愛憎之競作王泠然之負氣推命何踈魏丞相之復仇尤人太過凌轢險詖二子得之有若李文公誨弟之書華良夫干時之氣所謂君子之儒也徐凝馬植豈非得之且武當垂名於不朽矣尹璞所謂雖文何益後之學者得不以為炯戒哉唐摭言卷二
