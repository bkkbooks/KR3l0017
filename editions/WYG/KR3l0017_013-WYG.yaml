body:
  text: 唐摭言卷十三五代王定保撰敏捷王勮絳州人開耀中任中書舍人先是五王同日出閤受冊有司忘載冊文百寮在列方知闕禮勮召小吏五人各執筆口授分冩一時俱畢開元中李翰林應詔草白蓮花開序及宫詞十首時方大醉中貴人以冷水沃之稍醒白於御前索筆一揮文不加㸃温庭筠燭下未嘗起草但籠袖凭几每賦一咏一吟而已故場中號為温八吟段維晩富辭藻敏贍第一常私試八韻好吃煎餅凡一箇煎餅成一韻燦然昭宗天復元年正旦東内反正既御樓内翰惟吳子華先至上命於前跪草十餘詔簡備精當曾不頃刻上大加賞激短李鎮揚州請章孝標賦春雪詩命札於臺盤上孝標唯然索筆一揮云六出飛花處處飄黏窗拂砌上寒條朱門到晩難盈尺盡是三軍喜氣消白中令鎮荆南杜藴常侍亷問長沙時從事盧發致聘焉發酒酣傲睨公少不懌因改著詞令曰未得凌煙列畫圗也曾金闕掌洪爐少年從事誇門第莫向罇前喜氣麄盧答曰曽入君王夢裏圗文章官職勝崔盧暫來闗外分憂寄不稱賓筵語氣麄公極歡而罷張祜客淮南幕中赴宴時杜紫微為支使南座有屬意之處索骰子賭酒牧微吟曰骰子廵廵裹手拈無因得見玉纎纎祜應聲曰但知報道金釵落髣髴還應露指尖栁棠謁梓州楊尚書汝士因赴社宴楊公逼棠巨杯棠堅不飲楊公口占一篇曰文章謾道能吞鳯杯盞何曾解喫魚今日梓州陪社宴定應􅇜著老尚書棠應聲曰未向燕臺逢厚禮幸陪社宴接餘歡一魚喫了終無愧鯤化為􅉇也不難栁公權武宗朝在内廷上常怒一宫嬪乆之既而復召謂公權曰朕怪此人然若得學士一篇當􅇚然矣目御前有蜀牋數十幅因命授之公權畧不佇思而成一絶曰不分前時忤主恩己甘寂寞守長門今朝却得君王顧重入椒房拭淚㾗上大恱賜錦綵二十疋令宫人拜謝之山北沈侍郎主文年特召温飛卿於簾前試之為飛卿愛救人故也適屬翌日飛卿不樂其日晚請開門先出仍獻啟千餘字或曰潜救八人矣裴䖍餘咸通末佐北門李公淮南幕嘗游江舟子刺船誤為竹篙濺水濕近座之衣公為之色變䖍餘遽請彩牋紀一絶曰滿額鵝黄金縷衣翠翹浮動玉釵垂從教水濺羅衣濕知道巫山行雨歸公覽之極歡命謳者傳之韋蟾左丞至長樂驛亭見李湯給事題名索筆紀之曰渭水秦山豁眼明希仁何事寡詩情祇應學得虞姬婿書字纔能記姓名鄭仁表起居經過滄浪峽憇於長亭郵吏堅進一板仁表走筆曰分陜東西路正長行人名利火然湯路傍著個滄浪峽真是將閑攪撩忙裴廷裕乾寧中在内廷文書敏捷號為下水船梁太祖受禪姚洎為學士嘗從容上問及廷裕行止洎對曰頃嵗左遷今聞旅寄衡水上曰頗知其人搆思甚捷對曰向在翰林號為下水船太祖應聲謂洎曰卿便是上水船也洎微笑深有慙色議者以洎為急灘頭上水船也矛楯令狐趙公鎮維揚處士張祜常與狎讌公固視祜改令曰上水船風又急帆下人須好立祜應聲答曰上水船船底破好看客莫倚柂沈亞之嘗客逰為小輩所試曰某改令書俗語各兩句伐木丁丁鳥鳴嚶嚶東行西行遇飯遇􅅅亞之答曰如切如磋如琢如磨欺客打婦不當嘍囉元和中長安有沙門不記名氏善病人文章尤能捉語意相合處張水部頗恚之冥搜愈切因得句曰長因送人處憶得别家時徑往誇揚乃曰此應不合前輩意也僧微笑曰此有人道了也籍曰向有何人僧乃吟曰見他桃李樹思憶後園春籍因撫掌大笑張處士憶柘枝詩曰鴛鴦鈿帶抛何處孔雀羅衫屬阿誰白樂天呼為問頭祜矛盾之曰鄙薄問頭之誚所不敢逃然明公亦有目連變長恨詞云上窮碧落下黄泉兩處茫茫都不見此豈不是目連訪母􅁘章孝標及第後寄淮南李相曰或云寄白樂天及第全勝十改官金湯鍍了出長安馬頭漸入揚州郭為報時人洗眼看紳亟以一絶箴之曰假金方用真金鍍若是真金不鍍金十載長安得一第何須空腹用髙心方干姿態山野且更􅇠缺然性好凌侮人有龍丘李主簿者不知何許人偶於知聞處見干而與之傳盃酌龍丘目有翳改令以譏之曰干改令諸人𧰼令主措大喫酒㸃鹽軍將喫酒㸃醬只見門外著籬未見眼中安障龍丘答曰措大喫酒㸃鹽下人喫酒㸃鮓干嗜鮓只見半臂著襕未見口唇開㡁一座大笑惜名李建州嘗遊明州慈溪縣西湖題詩後黎卿為明州牧李時為都官貟外託與打詩板附行綱軍將入京蜀路有飛泉亭亭中詩板百餘然非作者所為後薛能佐李福於蜀道過此題云賈掾曾空去題詩豈易哉悉打去諸板惟留李端巫山髙一篇而已韓文公作李元賓墓銘曰文髙乎當世行出乎古人或謂文公以觀文止髙乎當世盖謂已髙乎古人也李繆公貞元中試日有五色賦及第最中的者賦頭八字曰徳動天鑒祥開日華後出鎮大梁聞浩虗舟應宏詞復賦此題頗慮浩賦逾已専馳一介取本既至啟緘尚有憂色及覩浩破題云日麗焜煌中含瑞光程喜曰李程在裏裴令公居守東洛夜宴半酣公索聨句元白有得色時公為破題次至楊侍郎汝士或曰非也曰昔日蘭亭無艷質此時金谷有髙人白知不能加遽裂之曰笙歌鼎沸勿作此泠淡生活元顧曰白樂天所謂能全其名者也湖南日試萬言王璘與李羣玉校書相遇于嶽􅅢寺羣玉揖之曰公何許人璘曰日試萬言王璘羣玉待之甚淺曰請與公聨句可乎璘曰惟子之命羣玉因破題而授之不記其詞璘覧之畧不佇思而繼之曰芍藥花開菩薩面㯶櫚葉散野叉頭羣玉知之訊之他事矣論曰搆思明速禀生知乎用不以道利口而已矛楯相攻其揆一也惜名掩善仁者所忌堯舜其猶病諸無名子謗議貞元中劉中州任大夫科選多濫進有無名子自云山東野客移書于劉吏部足下公總角之年竒童入仕有方朔之專對無枚臯之敏才佳句推長竿妙入神善謔稱名字不正過此以往非僕所聞徒以命偶良時身居顯職方云好經術重文章賣此虗名負其美稱今年聖上虚天官之署委平衡之權所期公有獨見之明清平為首豈意公有専恣之行髙下在心且數年以來皆無大集一昨所試四方畢臻公但以捜索為功糾訐為務或有小過必陷深文既毁其髪膚又貶其官序孝子􅃜全歸之望良臣絶没齒之怨豈以省闥從容之司甚於府縣暴虐之政所立嚴法樹威脅人云奉徳音㒺畏上下使聖主失含𢎞之道損寛仁之徳豈忠臣之節􅁘主上髙拱穆清之中足下每以煩碎之事奏請無度塵黷頗多呈三接以示人期一言以悟主朝臣氣懾選士膽驚内以承寵承榮外以作威作福豈良臣之體􅁘且兩京常調五千餘人書判之流亦有碩學之輩莫不風趨洛邑霧委咸京其常衮之徒令天下受屈且衮以小道矯俗以大言誇時宏詞曾下登科平判又不入等徒以竊居翰苑謬踐掖垣雖十年掌於王言豈一句在於人口以散鋪不對為古以率意不經為竒作者見之痛心後來聞之撫掌奈何輕蔽天下之才以自稱為己髙以少取為公道故郗至自伐稱兵處父尚云終喪其族以兹偏見求典禮闈深駭物情實乖時望故詩曰濟濟多士文王以寧夫聖人用心異代同體衮云親奉宻㫖令少取入等豈聖人容衆之意􅁘為近臣而厚誣干處士之横議甚不可也況杜亞薄知經籍素懵文詞李翰雖以詞藻擢第不以書判擅名不慎舉人自貽伊咎又常衮謂所親曰昨者考判以經語對經以史語對史皆未㸃對考為下等先翰有常無名判云衛侯之政由寗氏魯侯之令出季孫又常無欲云在凌室而須開闕夷盤而不可豈以經對史􅁘又嚴迪云下樊姬之車曳鄭崇之履豈以史對經耶數十年之間布衆多之口縦世人可罔而先賢安可誣也今信四豎子取彼五幽人且吉中孚判以大明御宇為頭以敢告車軒為尾初𩔖是頌翻乃成箴其間又金盤對于玉府非惟問頭不識抑亦義理全乖據此口嘲堪入覼縷張載華以江皋對瀍洛朱邵南以養老對乞言理目未通對仍未識並考入等可哀也哉王申則童子何知裴通則因人見錄茍容私謁豈謂公平夫有西施之容方可論于美醜無太阿之利安可議其斷割使五千之人囂然騰口四海之内孰肯甘心況宏詞大國光華吏曺物色公明立標榜令盡赴上都東京者棄而弗收常衮大辱于國豈以往來敗績自喪秣陵之師今日復讎欲雪㑹稽之恥雖擢須賈之髮衮不足以贖罪負廉頗之荆公不足以謝過況所置科目標在格文盡無宏詞固違明勑欺天必有大咎凌人必有不祥足下以此持衡實負明公以此求相寔負蒼生況公為主司自合參議信衮䓁升降由已取捨在心使士子含寃不得申結舌不得語㒺上若是欺下如斯豈以天聽葢髙帝閽難呌亦由宰臣守道任公等弄權嗚呼使朱雲在朝汲黯當位則敗不旋踵安得保家宰輔侍郎非公等所望也無名子長揖詩曰三銓選客不須嗔五箇登科各有因無識伯和憐吉獠㺯權虞候為王申載華甲第歸丞相裴子門徒入舍人莫怪邵南書判好他家自有景監親顔標咸通中鄭薰下狀元及第先是徐冦作亂薫志在激勸勲烈謂標魯公之後故擢之巍峩既而問及廟院標曰寒素京國無廟院薰始大悟塞黙乆之時有無名子嘲曰主司頭腦太冬烘錯認顔標作魯公崔澹試以至仁伐至不仁賦時黄巢方熾因為無名子嘲曰主司何事厭我皇􅄙把黄巢比武王趙隲試被衮以象天賦更放韓衮為狀元或為中貴語之曰侍郎既試王者被衮以象天更放韓衮狀元得無意乎隲由是求出華州劉允章試天下為家賦為拾遺杜裔休駮奏允章詞窮乃謂與裔休對時允章出江夏裔休尋亦改官光啟中蔣嶓以丹砂授善和韋中令張鵠吳人有文而不貧或刺之曰張鵠只消千䭾絹蔣嶓唯用一丸丹論曰飛書毁謗自古有之言之公足以改過不公足以推命睚眦之讎無益於己夫子之謂桓魋孟子之稱臧倉其是之謂與唐摭言卷十三
