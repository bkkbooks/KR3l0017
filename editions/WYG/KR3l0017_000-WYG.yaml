body:
  text: 唐摭言小說家𩔖一雜事之屬提要臣等謹案唐摭言十五卷五代王定保撰舊本不題其里貫其序稱王溥為從翁則溥之族也陳振孫書録解題謂定保為吳融之壻光化三年進士䘮亂後入湖南五代史南漢世家稱定保為邕管巡官遭亂不得還劉隱辟置幕府至劉龑號號之時尚在其所終則不得而詳矣考定保登第之嵗距朱温簒唐僅六年又序中稱溥為丞相則是書成於周世宗顯徳元年以後故題唐國號不復作内詞然定保生於咸通庚寅至是年八十五矣是書葢其暮年所作也同時南唐鄉貢士何晦亦有唐摭言十五卷與定保書同名今晦書未見而定保書刻於商氏稗海者刪削大半殊失其真此本為松江宋賓王所録末有䟦語稱以汪士鋐本校正較稗海所載特為完備近日揚州新刻即從此本録出惟是晁公武讀書志稱是書分六十三門而此本實一百有三門數目差舛不應至是豈商維濬之前已先有刪本耶是書述有唐一代貢舉之制特詳多史志所未及其一切雜事亦足以覘名塲之風氣騐士習之淳澆法戒兼陳可為永鑑不似他家雜録但記異聞己也據定保自述葢聞之陸扆呉融李渥顔蕘王溥王渙盧延讓楊贊圖崔籍若等所談云乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:719b7f97906691dbde64432790dd7a4f58ef586a88ae9173fe8943e00eeeaad1
