body:
  text: 唐摭言卷十二五代王定保撰自負杜甫莫相疑行男兒生無所成頭皓白牙齒欲落真可惜憶獻三賦蓬萊宫自怪一日聲輝赫集賢學士如堵墻觀我落筆中書堂往時文彩動人主今日饑寒趨路傍晚將末節契年少當面輸心背面笑寄謝悠悠世上兒莫争好惡莫相疑甫獻韋右丞紈袴不餓死儒冠多悞身丈人試静聽賤子請具陳甫昔少年日蚤充觀國賔讀書破萬卷下筆如有神賦料揚雄敵詩將子建親李邕求識面王翰願卜隣自謂頗挺生立登要路津致君堯舜上再使風化淳此意竟蕭索行謌非𨼆淪騎驢三十年旅食京華春朝叩富兒門暮隨肥馬塵殘盃與冷炙到處潜悲辛主上頃見徵欻然欲求伸青冥却垂翅蹭蹬無縱鱗甚愧丈人厚甚知丈人真每於百僚上猥誦佳句新竊效貢公喜難甘原憲貧焉能心怏怏只是走踆踆今欲東入海即將西去秦尚憐終南山㢠廻首清渭濵常擬報一飯況懐辭大臣白鷗没浩蕩萬里誰能馴崔仁師之孫崔湜并滌及從兄涖並有文翰列居清要每私宴之際自比王謝之家謂人曰吾之門人及出身歴官未嘗不為第一丈夫當先㨿要路以制人豈能黙黙受制于人故進取不已而不以令終開元中薛據自恃才名於吏部參選請受萬年録事流外官共見宰執訴云赤録事是某等清要官今被進士欲奪則等色人無措手足矣遂罷鄭起居仁表詩曰文章世上争開路閥閱山東拄破天張曙拾遺與杜荀鶴同年嘗醉中謔荀鶴曰杜十五公大榮荀鶴曰何榮曙曰與張五十郎同年争不榮荀鶴應聲答曰是公榮小子争得榮曙笑曰何也荀鶴曰天下祇知有杜荀鶴阿没處知有張五十郎盧延讓業癖澁詩吳翰林雖以賦卷擢第然八面受敵深知延讓之能延讓始投贄卷中有說詩一篇斷句云因知文賦易為下者之乎子華笑曰上門惡罵來薛保遜好行巨編自號金剛杵太和中貢士不下千餘人公卿之門卷軸填委率為閽媪脂燭之費因之平易者曰若薛保遜卷即所得倍于常也劉允章侍郎主文年牓南院曰進士納卷不得過三軸劉子振聞之故納四十軸元次山中興頌序云天寳十四年安禄山陷洛陽明年犯長安天子幸蜀太子即位于靈武明年皇帝移軍鳯翔其年復兩京上皇還京師夫立聖徳大業者必有謌頌若今謌頌聖徳刻諸金石非老于文學其誰宜為盧肇初舉先逹或問所來肇曰某𡊮民也或曰𡊮州出舉人􅁘肇曰𡊮州出舉人亦由沅江出龜甲九肋者盖稀矣王適侍郎元和初舉賢良方正直言極諫科太直見黜故韓文公誌適墓云上初即位以四科募天下士君笑曰此非吾時􅁘即提所作書縁路歌趨直言試既至對語驚衆不中第益乆困矣薛能尚書題集後曰詩源何代失澄清處處狂波汙後生常感道孤吟有淚却縁風壊語無情難甘惡少欺韓信枉被諸侯殺襧衡縱有緱山也無益四方聨絡盡蛙聲王貞白寄鄭谷郎中曰五百首新詩緘封寄去時祇憑夫子見不要俗人知火鼠重燒布氷􅁞乍吐絲直須天上手裁作領巾披袁參上中書姚令公元崇書曺州布衣袁參頓首謹上梁公閣下參將自託于君長為君用欲之乎且參之託君何以利君也若使君常懐相印不失通侯夀客滿堂黄金横帶則參請以車軌所至馬首所及而掩君之短稱君之長使天下之人不能議君矣若使君當不測之時遘不測之禍身從吏訊妻子滿獄則參請以翳翳之身眇眇之命伏死一劒以白君寃使酷殺之刑不能陷君矣若使君因縁謗書不得見察卒至免逐為天下笑則參以一寸之節三寸之舌抗義犯顔􅄙于闕庭使逐臣之名不得汙君矣君有盛忿之隙睚眦之怨朝廷之士議欲侵君則參請以直詞先挫其口不爾則更以眥血次汙其衣見凌之羞不能醜君矣若使君事至不可知千秋萬嵗後而君門闌卒有饑寒之虞則參請解參之裘推參之哺勉勉不怠終身奉之使子孫之憂不能累君矣此五者參之所以利君而自託也君其可乎夫人不易知知人不易參于君非有食客之舊門生之恩今便欲自託于君長為君用得無不知參意而疑參妄乎然妄人實亦有以何也參行年已半春秋客復數載黄金盡烏裘敝脣腐齒落不得成名而親之在堂終莫有慰日暮途逺不知所為然獨念非君無足依者故今敢以五利求市于君冀君一顧見誠使得慰親恐懼參聞言為必聽者出義為知己者行丈夫雄心能無感激況今以親親之故而祈徳于君使君歡然卒不見拒爾後即參尚何靣目遂得黙黙然而已哉本向時之言終不負徳夫幽則有鬼天則有神鬼神之間參所必有如使參敢負于君者則鬼神之靈共誅之敬以自盟惟君之惠信也且君以偉才四入為相艱難情偽君盡知之至于進人亦多矣然亦能有以參之五利而許君乎參必愚儕鯫生而自守取咎爾則君之相士何其備􅁘至愚殆欲窺君之鑒矣頓首頓首參今亦不敢盛稱譽上紿于君然竊自言之正參亦非天下庸人也今君若見相以義則參之本圖若見相以才則惟君所識今幸君之力能必致參顧此時坐而相棄語曰厚利可愛盛時難再失利後時終不有悔君獨不聞蒯人之泣乎昔蒯人為商而賣氷于市客有苦熱者將買之蒯人自以得時欲邀客以數倍之利客于是怒而去俄而其氷亦散故蒯人進且不得氷二者俱亡自泣而去今君坐青雲之中平衡天下天下之士皆欲附矣此亦君賣冰之秋而士買冰之際有利則合豈宜失時茍使君强自遲囘至冰散則君尚欲開口其事焉得哉願少圖之無為蒯人之事也參頓首輕佻戲謔嘲咏附顧雲大順中制同羊昭業等十人修史雲在江淮遇髙逢休諫議時劉子長僕射清名雅譽充塞搢紳其弟崇望復在中書雲以逢休與子長舊交將造門希致先容逢休許之乆矣雲臨岐請書逢休授之一圅甚草創雲微有惑因潛啟閱之凡一幅並不言雲但曰羊昭業等擬將一尺三寸汗脚踏地燒殘龍尾道懿宗皇帝雖簿徳不任被前人羅織執大政者亦大悠悠雲吁歎而已李白戲贈杜甫曰長樂坡前逄杜甫頭戴笠子日卓午借問形容何痩生祇為從来學詩苦鄭光業中表間有同入試者于時舉子率皆以白紙糊案子面昌圖潜記之曰新糊案子其白如銀入試出試千春萬春光業弟兄共有一巨皮箱凡同人投獻之詞有可嗤者即投其中號曰苦海昆季或從容用資諧戲即命二僕舁苦海于前人閱一編靡不極歡而罷光業常言及第之嵗策試夜有一同人突入試鋪為吳語謂光業曰必先必先可以相容否光業為輟半鋪之地其人復曰必先必先諮仗一杓水光業為取其人再曰便干託煎一椀茶得否光業欣然與之烹煎居二日光業狀元及第其人首貢一啟頗叙一宵之素略曰既取水更煎茶當時之不識貴人凡夫肉眼今日之俄為後進窮相骨頭羅𨼆謝裴廷翰詩卷云澤國佳人唯粧半面營邱辨士或獻空籠賈島不善程式每自叠一幅廵舖告人曰原夫之輩乞一聨乞一聨薛保遜大中朝尤肆輕佻因之侵侮諸叔故自起居舍人貶洗馬而卒其子昭緯頗有父風常任祠部貟外時李系任小儀王蕘任小賔正旦立仗班退昭緯朗吟曰左金烏而右玉􅇠天子旌旂蕘遽請下句昭緯應聲答曰上李系而下王蕘小人行綴聞者靡不鬨哂天復中自臺丞累貶澄州司馬中書舍人顔蕘當制略曰陵轢諸父代嗣其㓙咸通末執政病舉人僕馬太盛奏請進士舉人許乗驢鄭光業材質瓌偉或嘲之曰今年策下盡騎驢短轡長鞦滿九衢清痩兒郎猶自可就中愁殺鄭昌圖論曰語云當仁不讓于師顔氏子亦曰舜何人也予何人也茍得其道自方於舜不為之太過茍失其道五尺童子能不鄙其妄歟參以五利受售不繫能否儒行缺矣輕薄之徒終喪厥徳旅獒之戒人子其惟慎諸設竒沽譽咸通中鄭愚自禮部侍郎鎮南海時崔魏公在荆南愚著錦襖子半臂袖卷謁之公大竒之㑹夜飲更衣賓從間竊謂公曰此應是有慙不稱耳既而復易之紅錦尤加煥麗衆莫測矣王璘舉日試萬言科崔詹事觀察湖南因遺之夾纈數匹璘翌日以中單襜褕衣之以詣崔公接之大驚矣酒失崔櫓酒後失忤䖍州陸郎中肱以詩謝之曰醉時顛蹶醒時羞麯蘖催人不自由叵耐一雙窮相眼不堪花卉在前頭宋人衛元規酒後忤宋州丁僕射謝書略曰自兹囚酒星於天獄焚醉日於秦坑人多記之杜工部在蜀醉後登嚴武之牀厲聲問武曰公是嚴挺之子乎武色變甫復曰僕乃杜審言兒于是少􅄙韓衮咸通七年趙隲下狀元及第性好嗜酒謝恩之際趙公與之首宴公屢賞歐陽琳文學衮睨之曰明公何勞再三稱一複姓漢公愕然為之徹席自是從容不過三爵及杏園開宴時河中蔣相以故相守兵部尚書其年子泳及第相國欣然來突衆皆榮之衮厲聲曰賢郎在座兩頭著子女相公來此得否相公錯􅌓而去及泳歸公庭責之曰席内有顛酒同年不報我豈人子􅁘自是同年莫敢與之歡醉矣史萇上李中丞書禍之將至鬼神奪魄豈有委身府幕塵忝下僚而扺犯威重前後非一中丞審萇豈非知禮之人豈非感恩之人自拜揖馬塵十有三載盃酒歌咏乆䝉提携未省竟有差失中丞因賜賞鑒辟書俯及陪接萬里星霜二年正當策名之時豈願固有干觸此葢命之牽陷一至于此實非常情之所料也豈非十二年間東馳西走肝膽塗地竟無所成鬂髮斑白幸逢推薦恩命垂至自貽顛危昏昏薄言㒺知攸處豈非命矣豈非命矣且初坐之時每舉一盞酒未嘗不三思其過似覺體中有酒亦哀請矜量既對衆賓復不敢苦訴俄而迷亂乍合若怪魅以憑心人事且不知死亦寧悟哀哉微命有此舛剥中丞縦寛以萬死萇亦無所施其面目不即引決者伏念累世單緒一身蚤孤中年未婚晚乏兒息封樹何日先靈靡安痛此纒廹乞哀殘喘今髠剪首髪自為毁責期在粉骨永知此過中丞旋斾之日願隨一卒步走後塵洗節布誠以期他効伏願少垂舊惠戀戀故人無任憂悸感切之至謹投書閣下荒辭無叙萬不申一仍憑押衙口哀謝不宣萇再拜元相公在浙東時賓府有薛書記飲酒醉後因争令擲注子擊傷相公猶子遂出幕醒来乃作十離詩上獻府主馴擾朱門四五年毛香足浄主人憐無端咬著親情客不得紅絲毯上眠犬離主越管宣毫始稱情紅箋紙上撒花瓊都縁用乆鋒頭盡不得羲之手裏擎筆離毛雲耳紅毛淺碧蹄追風曾到日東西為驚玉貌郎君墜不得華軒更一嘶馬離厩隴西獨自一孤身飛去飛来上錦裀都縁出語無方便不得籠中更喚人鸚鵡離籠出入朱門未忍抛主人常愛語咬咬銜泥􅁾涴珊瑚簟不得梁間更壘巢燕離巢皎潔圓明内外通清光似眼水精宫都縁一㸃瑕相􅁾不得終宵在掌中珠離掌戲躍蓮池四五秋常搖朱尾弄輪鈎無端擺斷芙蓉朶不得清波更一遊魚離池爪利如鋒眼似鈴平原捉􅇠稱髙情無端竄向青雲外不得君王手上擎應離主蓊鬱新栽四五行常將貞節負秋霜為縁春笋鑽墻破不得垂隂覆玉堂竹離亭鑄㵼黄金鏡始開初生三五月徘徊為􅇜無限塵蒙蔽不得華堂上玉臺鏡離臺馬上同擕今日盃湖邊還折舊年梅年年祇是人空老處處何曾花不開歌咏每添詩酒興醉酣還命管絃来罇前百事皆依舊㸃檢唯無薛秀才元公詩論曰蕭琛以桃杖虎靴邢紹以絳綿糾髮所務先設竒以動衆後務能以制人振天下之大名為一時之口實者也鄭公之服錦王公之衣纈得無意于彼乎茍名實相逺則服之不𠂻身之災也沉􅒬之失聖人所戒雖王佐之才得以贖過其如名教何唐摭言卷十二
