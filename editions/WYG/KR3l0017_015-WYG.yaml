body:
  text: 唐摭言卷十五五代王定保撰雜記髙祖武徳四年四月十一日勅諸州學士及白丁有明經及秀才俊士明于禮體為鄉曲所稱者委本縣考試州長重覆取上等人每年十月随物入貢至五年十月諸州共貢明經一百四十三人秀才六人俊士三十九人進士三十人十一月引見敕付尚書省考試十二月吏部奏付考功員外郎申世寧考試秀才一人俊士十四人所試並通敕放選與理人官其下第人各賜絹五匹充歸糧各勤修業自是考功之試永為常式至開元二十四年以員外郎李昂與舉子矛楯失體因以禮部侍郎專知貞觀初放牓日上私幸端門見進士于牓下綴行而出喜謂侍臣曰天下英雄入吾彀中矣進士牓頭豎黏黄紙四張以氈筆淡墨衮轉書曰禮部貢院四字或曰文皇頃以飛帛書之或象陰注陽受之状進士舊例于都省考試南院放榜南院乃禮部主事受領文書于此凡板様及諸色條流多于此列之張牓墻乃南院東牆也别築起一堵髙丈餘外有壖垣未辨色即自北院將牓就南院張掛之元和六年為監生郭東里决破棘籬籬在垣墻之下南院正門外亦有之坼裂文榜因之後来多以虚榜自省門而出正榜張亦稍晚開成二年髙侍郎鍇主文恩賜詩題曰霓裳羽衣曲三年復前詩題為賦題太學石經詩並辭入貢院日面賜大中中都尉鄭尚書放牓上以紅牋筆札一名紙云鄉貢進士李御名以賜鎬文貞公神道碑太宗之文時徵將薨太宗嘗夣見及􅁴左右奏徵卒故曰俄于髣髴忽覩形儀復曰髙宗昔日得賢相于夣中朕今此宵失良臣于􅁴後髙祖呼裴寂為裴三明皇呼宋濟作宋五德宗呼陸䞇為陸九髙祖呼蕭瑀為蕭郎宣宗呼鄭鎬為鄭郎裴晉公下世文宗賜御製一篇置於靈座之上白樂天去世大中皇帝以詩弔之曰綴玉聨珠六十年誰教㝠路作詩仙浮雲不繫名居易造化無為字樂天童子解吟長恨曲將軍能唱琵琶篇文章已滿行人耳一度思卿一愴然元和十三年進士陳標獻諸先輩詩曰春官南院院墻東地色初分月色紅文字一千重馬擁喜歡三十二人同眼看魚變辭凡水心逐鶯飛出瑞風莫怪雲泥從此别總曾惆悵去年中令狐趙公大中初在内庭恩澤無二常便殿召對夜艾方罷宣賜金蓮花送歸院院使已下謂是駕來皆鞠躬階下俄𫝊呼曰學士歸院莫不驚異金蓮花燭柄耳惟至尊方有之韋澳孫宏大中時同在翰林盛暑上在太液池中宣二學士既赴召中貴人頗以絺綌為訝初殊未悟及就坐但􅁴寒氣逼人熟視有龍皮在側尋宣賜銀餅饀食之甚美既而醉以醇酎二公因兹苦河魚者數夕上竊知笑曰卿不禁事朕日進十數未嘗有損銀餅饀皆乳酪膏􅃾所製也王源中文宗時為翰林承㫖學士暇日與諸昆季蹴踘于太平里第毬子擊起誤中源中之額薄有所損俄有急召比至上訝之源中具以上聞上曰卿大雍睦遂賜酒兩盤每盤貯十金碗每椀容一升許宣令并椀賜之源中飲之無餘略無醉態白樂天以正卿致仕時裴晉公保釐夜宴諸致仕官樂天獨有詩曰九燭臺前十二姝主人留醉任歡娱飃䬙舞袖雙飛蝶宛轉歌喉一索珠坐乆欲醒還酩酊夜深臨散更踟蹰南山賔客東山妓此㑹人間曾有無長慶初趙相宗儒為太常卿贊郊廟之禮罷相三十餘年年七十六衆論其精健有常侍李益笑曰僕為東府試官所送進士也開成中户部楊侍郎汝士檢校尚書鎮東川白樂天即尚書妹婿時樂天以太子少傅分洛戲代内子賀兄嫂曰劉綱與婦共升仙弄玉隨夫亦上天何似沙哥沙哥汝士小字領崔嫂碧油幢引向東川又曰金花銀椀饒兄用罨畫羅裙盡嫂裁覓得黔婁為妹婿可能空寄蜀茶来李石相公鎮荆崔魏公在賔席未㡬公擢拜翰林明年登相位時石猶在鎮故賀詩曰賔筵初起曾陪罇俎之歡將幕未移已在陶鈞之下此李隲之詞也時為節度巡官薛能尚書鎮彭門時漙劉巨容周岌俱在麾下未數嵗􅄎鎮徐巨容鎮襄岌鎮許俱假端揆故能詩曰舊將己為三僕射病身猶是六尚書崔安潛鎮西川李鋌為小將廣明初駕幸西蜀鋌乃蜀帥帶平章事安潛乃具僚耳曾趨走人皆美之庾承宣主文後六七年方衣金紫時門生李石先於内庭恩賜矣承宣拜命之初石以所服紫袍金魚拜獻座主令狐趙公在相位馬舉為澤潞小將因奏事到宅㑹公有一門僧善聲色偶窺之謂公曰適有一軍將參見相公是何人公以舉名語之僧曰竊視此人他日當與相公為方面交代公曰邊方小將縱有軍功不過塞垣一鎮柰何以老夫交代僧曰相公第更召與語貧道為細看公然之既去僧曰今日看更親切并恐是揚汴公於是稍接之矣咸通元年公鎮維揚舉破龎勛有功先是上面許成功與卿揚州既而難于爽信即除舉淮南行軍司馬公聞之即處公所司排比迎新使羣下皆曰此一行軍耳公乃以其事白之果如所卜光化二年趙光逢放柳璨及第光逢後三年不遷時璨自内庭大拜光逢始以左丞徵入未幾璨坐罪誅死光逢膺大用居重地十餘嵗七表乞骸守司空致仕居二年復徵拜上相韋承貽咸光中策試夜潛記長句于都堂西南隅曰褒衣博帶滿塵埃獨上都堂納試迴蓬巷幾時聞吉語棘籬何日免重来三條燭盡鐘初動九轉丹成鼎未開殘月漸低人擾擾不知誰是謫仙才又白蓮千朶照廊明一片昇平雅頌聲才唱第三條燭盡南宫風景畫難成光化初幾為杇墁者有所廢楊洞見而勉之遂留之如故趙渭南嘏嘗有詩曰蚤晚粗酧身事了水邊歸去一閑人果渭南一尉耳嘏嘗家于浙西有美姫嘏甚溺惑洎計偕以其母所阻遂不擕去㑹中元為鶴林之遊浙帥不知姓名窺之遂為其人奄有明年嘏及第因以一絶箴之曰寂寞堂前日又曛陽臺去作不歸雲當時聞說沙吒利今日青娥屬使君浙帥不自安遣一介歸之于嘏嘏時方出闗途次横水驛見兜舁人馬甚盛偶訊其左右對曰浙西尚書差送新及第趙先輩娘子入京姬在舁中亦認嘏嘏下馬揭簾視之姬抱嘏慟哭而卒遂葬于横水之陽條流進士咸通中上以進士車服僣差不許乗馬時場中不減千人雖勢可熱手亦皆跨長耳或嘲之曰今年敕下盡騎驢短胄長鞦滿九衢清痩兒郎猶是可就中愁殺鄭昌圗相國魁梧甚故有此句閩中進士薛令之閩中長溪人神龍二年及第累遷左庶子時開元東宫官僚清淡令之以詩自悼復紀于公署曰朝旭上團團照見先生盤盤中何所有苜蓿長闌干飰澁匙難綰羮稀筯易寛無以謀朝夕何由保嵗寒上因幸東宫覽之索筆判之曰啄木嘴距長鳳凰羽毛短若嫌松桂寒任逐桑榆暖令之因此謝病東歸詔以長溪嵗賦資之令之計月而受餘無所取歐陽詹卒韓文公為哀辭序云徳宗初即位宰相常衮為福建觀察使治其地衮以時進鄉縣小民有能讀書作文辭者親與之為主客之禮觀逰宴饗必召與之時未幾皆化翕然於時詹獨秀出衮加敬愛諸生皆推服閩越之人舉進士繇詹始也詹死于國子四門助教隴西李翺為𫝊韓愈作哀詞賢僕夫蕭頴士性異常嚴酷有一僕事之十餘載頴士每以箠楚百餘不堪其苦人或激之擇木其僕曰我非不能他從遲留者乃愛其才耳武公幹常事蒯希逸十餘嵗異常勤幹洎希逸擢第幹辭以親在乞歸就飬公堅留不住公既嘉其忠孝以詩送之略曰山險不曾離馬後酒醒常見在牀前同人醵絹贈行皆有繼和尋本末未得盧鈞僕夫已具宴集門及鈞孫肅僕夫並同前李元賔與弟書云賴一僕傭以資日給其文頗勤勤叙之而不記姓名李敬者本夏侯譙公之傭也公乆厄塞名塲敬寒苦備歴或為其𩔖所引曰當今北面官人入則内貴出則使臣到所在打風打雨你何不從之而孜孜事一窮措大有何長進縱不然堂頭官人此輩謂堂吏為官人豐衣足食所往無不克敬囅然曰我使頭及第後還擬作西川留後官衆皆大笑時譙公于壁後聞其言凡十餘嵗公自中書出鎮成都臨行有以邸吏託者一無所諾至鎮用敬知進奏既而鞅掌極矣向之笑者率多投之矣舊話一曰聞多見少跡静心勤省閑逰事知己也卷頭有眼投謁必其地也肚裏没嗔得失筭命羣居用和二曰貌謹氣和見面少聞名多古人有言見多成醜之謂也凡後進逰歴前逹之門或慮進趍揖讓偶有蹶失則雖有烜赫之文終負生踈之誚故文藝既至苐要投謁慶弔及時不必孜孜求見也如其深知已下嵗寒之契師友則不然也三曰上等舉人應同人舉推公共也中等舉人應丞郎舉計通塞也下等舉人應宰相舉切忌就門生手裏索及第求僧道薦屬姑息對人前説中表在重位誇解作客愛享後進酒食没用處天寳二年吏部侍郎宋遙苗晉卿等主試禄山請重試制舉人第一等人十無一二御史中丞張倚之子奭手持試紙竟曰不下一字時人謂之拽帛髙渙者鍇之子也久舉不第或謔之曰一百二十個蜣螂推一個屎塊不上蓋髙氏三牓每牓四十人薛昭儉昭緯之兄也咸通末數舉不第先達每接之即問曰賢弟蚤晩應舉昭儉知難而退論曰七情十義靡不宗於仁而祖於禮者矧乃四科之本文不居先三益之門徳常在首又何片言小善辨口利詞垂於簡編侔於粉繢者也或曰不然夫人頂天踵地惟呼最靈有徳者未必無文其上也文不勝徳其次也徳不勝文有若文徳具美含光不耀者其唯聖人乎奈何近世薄徒自為岸谷以含毫吮墨為末事以察言守分為名流洎乎評品是非適較古今竟不能措一詞發一論者能無媿于心乎故僕雖題親咏折衝罇俎者皆列於門目斯所以旌表贍敏而矛楯榛蕪也亦由辱以馬韉而俟之鶯谷知我者當免咎與若乃先達所𫝊臧否人物雖不研究根本皆可蓍鑑行藏莫匪正言足方周諺其有迹處皂𨽻而行同君子者茍遺而不書則取舍之道賤賢而貴愚忠孝之本先華而後寔七十子之徒其臣于季孟者亦其𩔖而已唐摭言卷十五
