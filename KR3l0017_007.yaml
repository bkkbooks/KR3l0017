body:
  text: 唐摭言卷七五代王定保撰起自寒苦不第即貴附武徳五年李義琛與弟義琰從弟上徳三人同舉進士義琛等隴西人世居鄴城國初草創未定家素貧乏與上徳同居事從姑定省如親焉隨計至潼闗遇大雪逆旅不容有咸陽商人見而憐之延與同寢處居數日雪霽而去琛等議鬻驢以一醉酬之商人竊知不辭而去義琛後宰咸陽召商人與之抗禮義琛位至刑部侍郎雍州長史義琰相髙宗皇帝上徳司門郎中王播少孤貧常客揚州恵昭寺木蘭院隨僧齋飡諸僧厭怠播至已飯矣後二紀播自重位出鎮是邦因訪舊逰向之題已皆碧紗幕其上播繼以二絶句曰二十年前此院逰木蘭花發院新修而今再到經行處樹老無花僧白頭上堂已了各西東慙愧闍黎飯後鐘二十年來塵撲面如今始得碧紗籠鄭朗相公初舉遇一僧善氣色謂公曰郎君貴極人臣然無進士及第之分若及第即一生厄塞既而狀元及第賀客盈門唯此僧不至及重試退黜唁者甚衆而此僧獨賀曰富貴在裏既而竟如所卜李絳趙郡賛皇人曾祖貞簡祖岡官終襄帥絳為名相絳子璋宣州觀察楊相公造白檀香亭子初成㑹親賓落之先是璋潜遣人度其廣狹織一地毯其日獻之及收敗璋從坐璋子徳璘名過其實入梁終夕拜徐商相公常於中條山萬固寺泉入院讀書家廟碑云隨僧洗鉢韋令公昭度少貧窶常依左街僧録净光大師隨僧齋粥净光有人倫之鑒常器重之好放孤寒元和十一年歳在丙申李涼公下三十三人皆取寒素時有詩曰元和天子丙申年三十三人同得仙袍似爛銀文似錦相將白日上青天李太尉徳裕頗為寒進開路及謫官南去或有詩曰八百孤寒齊下淚一時南望李崖州昭宗皇帝頗為寒進開路崔合州榜放但是子弟無問文章厚薄隣之金瓦其間屈人不少孤寒中唯程晏黄滔擅場之外其餘以程試考之濫得亦不少矣然如王貞白張蠙之詩趙觀文古風之作皆臻前輩之閫閾者也升沈後進太和中蘇景𦙍張元夫為翰林主人楊汝士與弟虞卿及漢公尤為文林表式故後進相謂曰欲入舉場先問蘇張蘇張尤可三楊殺我大中咸通中盛𫝊崔慎由相公嘗寓尺題于知聞或曰王凝裴瓉舍弟安潜朝中無呼字知聞㕔裏絶脱靴賓客凝終宣城瓉禮部尚書潜侍中太平王崇竇賢二家率以科目為資足以升沈後進故科目舉人相謂曰未見王竇徒勞漫走竒章公始舉進士致琴書於灞滻間先以所業謁韓文公皇甫員外時首造退之退之他適苐留卷而已無何退之訪湜遇竒章亦及門二賢見刺欣然同契延接詢及所止對曰某方以薄技卜妍醜於宗匠進退唯命一囊猶寘於國門之外二公披卷卷首有説樂一章未閲其詞遽曰斯髙文且以拍板為什麽對曰謂之樂句二公相顧大喜曰斯髙文必矣公因謀所居二公沈吟良久曰可於客户坊税一廟院公如所教造門致謝二公復誨之曰某日可逰青龍寺薄暮而歸二公其日聮鑣至彼因大署其門曰韓愈皇甫湜同謁幾官先輩不遇翌日輦轂名士咸往觀焉竒章之名由是赫然矣論曰馬不必騏驥要之善走浴不必江海要之去垢茍華而不實以比周皷譽者不為君子腹誹鮮矣知巳張燕公知房太尉獨孤常州知梁補闕二君子之美出於李翺上楊中丞書云竊以朝廷之士文行光明可以為後進所依歸者不過十人翺亦常伏其門下舉其五人則無誘勸之心雖有卓犖竒怪之賢固不可得而知也其餘或雖知欲為薦言于人復懼人不我信因人之所不信復生疑而不信自信猶且不固矧曰能人之固是以再往見之或不如其初三往復不如其再若張燕公之于房太尉獨孤常州之于梁補闕者萬不見一人焉李翺感知巳賦序貞元九年翺始就州序之貢與人事其九月執文章一通謁右補闕梁君當此時梁君譽塞天下属詞求進士奉文章走梁君門下者葢無虛日梁君知人之故也亦既相見遂與翺有相知之道焉謂翺得古人之遺風期翺之名不朽於無窮許翺以拂拭吹嘘翺初謂其面相進也亦未幸甚十一月梁君遘疾殁翺漸逰於朋友公卿間往往皆曰吾既藉子姓名于補闕梁君也翺乃知其非面進也當時意謂先進者遇人特達皆合有此心亦未謂知已之難得也梁君殁于兹五年翺學聖人經籍教訓文句之為文將數萬言愈昔年見梁君之文弗啻數倍雖不敢同徳于古人然亦幸無怍于中心每歳試于禮部連以文章罷黜名聲晦昧於時俗人皆謂之固宜然後知先進者遇人特達亦不皆有此心乃知知已之難得也夫見善而不能知雖善何為知而不能譽則如弗知譽而不能深則如弗譽深而不能久則如勿深久而不能終則如勿久翺雖不肖幸辱梁君所知君為之言於人豈非譽歟謂其得古人遺風豈非深歟而逮及終身豈非久歟不幸梁君短命遽殁是以翺未能有成也其誰將繼梁君之志而成之歟巳焉哉天之遽喪梁君也是使予之命久迍邅阨窮也遂賦知巳以自傷其言怨而不亂葢小雅騷人之餘風也李元賓曰觀有倍年之友朱巨源李華撰三賢論劉眘虚元徳秀蕭穎士或曰吾讀古人之書而求古人之賢未獲遐叔謂曰無世無賢人其或世教不至淪於風波雖賢不能自辨况察者未之究乎鄭衛方奏正聲間發極和無味至文無采聽者不達反以為怪譎之音太師樂工亦失容而止曼都之姿雜於憔悴被緼絮蒙蕭艾美醜夷倫自以為陋此二者既病不自明復求者亦昏將割其善惡在遷政化俗則賢不肖異貫而後賢者自明而察者不惑也予兄事元魯山而友劉蕭二功曹此三賢者可謂之達矣或曰願聞三子之畧遐叔曰元之志行當以道統天下劉之志行當以六經諧人心蕭之志行當以中古易今世元齊愚智劉戚一物不得其正蕭呼吸折節而獲重禄不易一刻之安元之道劉之深蕭之志及于夫子之門則達者其流也然各有病元病酒劉病賞物蕭病貶惡太亟奬能太重元奉親孝居喪哀撫孤仁徇朋友之急涖職明於賞罰終身貧而樂天知命以為王者作樂崇徳殷薦上帝以配祖考天人之極致也而詞章不稱是無樂也於是作破陣樂詞協商周之頌推是而論則見元之道矣劉名儒史官之家兄弟以學著稱乃述詩書禮易春秋為古文五説條貫源流偹古今之變推是而論則見劉之深矣蕭以詩書為煩尤罪子長不編年乃為列𫝊後代因之非典訓也將正其失自春秋三家之後非訓齊生人不録次序纉修以迄於今未就而殁推是而論則見蕭之志矣元據師保之席瞻形容不俟見而見其人劉備卿佐之服居賓友之地言理亂根源人倫𨼆明參乎元精而後見其妙蕭若百鍊之鋼不可屈抑當廢興去就之際一生一死之間而後見其大節視聽過速欲人人如我志與時多背常見詬於人取其中節之舉是可以為人師矣學廣而不徧精其貫穿甚於精者文方復雅尚之至嘗以律度百代為任古之能者往往不至焉超絶蹈厲不可為不知者言也茂挺父為莒丞得罪清河張惟一時佐亷使按成之茂挺初登科自洛還莒道邀使車發辭哀乞惟一涕下即日捨之且曰蕭賛府生一賢方資天下風教吾由是得罪無憾也夫如是得不謂之孝乎或曰三子者各有所與遊乎遐叔曰若太尉房公可謂名人矣毎見魯山即終日歎息謂余曰見紫芝眉宇使人名利之心盡矣若司業蘇公可謂賢人矣毎謂當時名士曰僕不幸生于衰俗所不恥者識元紫芝廣平程休士美端重寡言河間邢宇深明操持不局宇弟宙次宗和而不流南陽張茂之季豐守道而能斷趙郡李㟧伯髙含大雅之素㟧族子丹叔南誠莊而文丹族子惟岳謀道沈逺㢘静梁國喬澤徳源昂昂有古風𢎞農楊拯士扶敏而安道清河房垂翼明志而好古河東栁識方明遐曠而才是皆慕於元者也劉在京下常寢疾房公時臨扶風聞之通夕不寐顧謂賓從曰即若不起無復有神道尚書劉公每有勝理必詣與談終日忘返退而嘆曰聞劉公清言見皇王之理矣殷直清有識尚恨言理少對未與劉面常想見其人河東裴騰士舉朗邁真直弟霸士㑹峻清不雜隴西李廙敬叔堅明沖粹范陽盧虛舟幼真質方而清穎川陳讜言士然淡而不厭渤海呉興宗秀長専静不渝穎川陳兼不器行古人之道渤海髙適達夫落落有竒節是皆重劉者也工部侍郎韋述修國史推蕭同事禮部侍郎楊俊掌貢舉問蕭求人海内以為徳選汝南邵軫緯卿有詞學標幹天水趙驊雲卿才美行純陳郡殷寅直清達於名理河南源衍季融粹而復微㑹稽孔至惟微述而好古河南陸據徳隣恢恢善于事理河東栁芳仲敷該博故事長樂賈至幼隣名重當時京兆韋牧仲成逺慮而深南陽張友畧維之履道體仁友畧族弟邈季遐温其如玉中山劉穎士端疎明簡暢穎川韓拯佐元行修而文樂安孫益盈孺温良忠厚京兆韋建士經中明外純穎川陳晉正卿深于詩書天水尹微之誠貫百家之言是皆厚于蕭者也尚書顔公重名節敦故舊於茂挺少相知茂挺與趙驊邵軫洎華最善天下謂之蕭李之交殷寅源衍睦於二交之間不幸元罷魯山終於陸渾劉避地逝於安康蕭歸𦵏先人殁于汝南今復求斯人有之無之是必有之而察之未克也三賢不登尊位不享下夀居易委順賢人之達也不蒙其教生人之病余知三賢也深故言之不怍云一云李華復友權皋張友畧出皋墓銘也顔真卿與陸據栁芳善杜紫微覽趙渭南卷蚤秋詩云殘星幾㸃雁横塞長笛一聲人倚樓吟味不已因目嘏為趙倚樓復有贈嘏詩曰今代風騷將誰登李杜壇灞陵鯨海動翰苑鶴天寒今日訪君還有意三條氷雪借予看紫微更寄張祐畧曰睫在眼前長不見道非身外更何求誰人得似張公子千首詩輕萬户侯貞元中李元賓韓愈李絳崔羣同年進士先是四君子定交久矣共逰梁補闕之門居三歳肅未之面而四賢造肅多矣靡不偕行肅異之一日延接觀等俱以文學為肅所稱復奬以交逰之道然肅素有人倫之鑒觀愈等既去復止絳羣曰公等文行相契他日皆振大名然二君子位極人臣勉旃勉旃後二賢果如所卜李華著含元殿賦蕭穎士見之曰景福之上靈光之下白樂天初舉名未振以謌詩謁顧况况謔之曰長安百物貴居大不易及讀至賦得原上草送友人詩曰野火燒不盡春風吹又生况嘆之曰有句如此居天下有甚難老夫前言戲之耳李太白始自蜀至京名未甚振因以所業贄謁賀知章知章覽蜀道難一篇揚眉謂之曰公非人世之人可不是太白星精耶蔣凝江東人工於八韻然其形不稱名隨計途次襄陽謁徐相商公疑其假手因試峴山懐古一篇凝於客次賦成尤得意時温飛卿居幕下大加稱譽論曰夫求知者匪言不通既通者匪節不合得之於内失之於外萬萬不能移也所以越石父免於羈束未旋踵而責以非禮善窺其合而已矣其有属詞叙事言雖訐直知之者不其咎歟茍異於是其如險詖何唐摭言卷七
