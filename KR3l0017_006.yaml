body:
  text: 唐托言卷六五代王定保撰公薦門生薦座主師友相薦附崔郾侍郎既拜命於東都試舉人三署公卿皆祖於長樂傳舍冠蓋之盛罕有加也時吳武陵任太學博士䇿蹇而至郾聞其來微訝之乃離席與言武陵曰侍郎以峻德偉望為明天子選才俊武陵敢不薄施塵露向者偶見太學生十數輩揚眉抵掌讀一卷文書就而觀之乃進士杜牧阿房宫賦若其人真王佐才也侍郎官重必恐未暇披覽於是搢笏朗宣一遍郾大竒之武陵曰請侍郎與狀頭郾曰已有人曰不得已即第五人郾未遑對武陵曰不爾即請還此賦郾應聲曰敬依所教既即席白諸公曰適吳太學以第五人見惠或曰為誰曰杜牧衆中有以牧不拘細行間之者郾曰已許吳君矣牧雖屠沽不能易也韓文公皇甫湜貞元中名價籍甚亦一代之龍門也竒章公始來自江黃間置書囊於國東門攜所業先詣二公卜進退偶屬二公從容皆謁之各袖一軸面贄其首篇説樂韓始見題而掩卷問之曰且以拍扳為什麼僧孺曰樂句二公因大稱賞之問所止僧孺曰某始出山隨計進退唯公命故未敢入國門答曰吾子之文不止一第當垂名耳因命於客户坊僦一室而居俟其他適二公訪之因大署其門曰韓愈皇甫湜同訪幾官先輩不遇翌日自遺闕而下觀者如堵咸投刺先謁之由是僧孺之名大振天下盧延讓光化三年登第先是延讓師薛許下為詩詞意入癖時人多笑之吳翰林融為侍御史出官峽中延讓時薄逰荆渚貧無卷軸未遑贄謁會融表弟滕籍者偶得延讓百篇融覽大竒之曰此無他貴不尋常耳於是稱之于府主成汭時故相張公職大租於是邦常以延讓為笑端及融言之咸所改觀由是大獲舉糧延讓深所感激然猶因循竟未相面後值融赴急徴入內庭孜孜於公卿間稱譽不已光化戊午歲來自襄南融一見如舊相識延讓嗚咽流涕于是攘臂成之矣將仕郎守太子校書郎王泠然謹再拜上書相國燕公閣下孔子曰居是邦也事其大夫之賢者則僕所以有意上書於公為日久矣所恨公初為相而僕始總角公再為相僕方志學及僕預鄉舉公左官于巴丘及僕參常調而公統軍於沙朔今公復為相隨駕在秦僕適效官分司在洛竟未識賈誼之面把相如之手則堯舜禹湯之正道稷契夔龍之要務焉得與相公論之乎昔者公之有文章時豈不欲文章者見之乎公未富貴時豈不欲富貴者用之乎今公貴稱當朝文稱命代見天下未富貴有文章之士不知公何以用之公一登甲科三至宰相是因文章之得用于今亦三十年後進之士公勿謂無其人何者長安令裴耀卿於開元五年掌天下舉擢僕髙第以才相知今尚書右丞王丘於開元九年掌天下選授僕清資以智見許然二君者若無明鑒寧處要津是僕亦有文章思公見也亦未富貴思公用也此非自媒自衒恐不道不知有唐以來無數才子至於崔融李嶠宋之問沈佺期富嘉謨徐彥伯杜審言陳子昂者與公連飛並驅更唱迭和此數公者真可謂五百年後挺生矣天喪斯文凋零向盡唯相公日新厥德長守富貴甚善甚善是知天贊明主而福相公當此之時亦宜應天之休報主之寵彌縫其闕匡救其災若尸祿備員則焉用彼相矣僕聞位稱燮理者則道合隂陽四時不愆則百姓無怨豈有冬初不雪春盡不雨麥苖繼日而青死桑葉未秋而黃落蠢蠢迷愚嗷嗷愁怨而相公溫眠甲第飽食廟堂僕則天地之一生人亦同人而怨相公也京房易傳曰欲德不用兹謂張言人君欲賢者而不用徒張此意厥災荒云大旱也隂陽不雨復曰師出過時兹謂曠其旱不生夫天道逺人道邇僕多言者也安知天道請以人事言之主上開張翰林引納才子公以傲物而富貴驕人為相以來竟不能進一賢拔一善漢髙祖云當今之賢士豈獨異于古人乎有而不知是彰相公之暗知而不用是彰相公之短故自十月不雨至于五月雲才積而便散雨垂落而復收此欲德不用之罰也仍聞羌渾為孽日冦邊陲邦家連兵來往塞下巴西諸將必不出師過時之咎也四郊之多壘卿大夫之辱也不知廟堂肉食者何以謀之相公在外十餘年而復相國險阻艱難備嘗之矣民之情偽盡知之矣今人室如懸罄野無青草何恃而不恐天則不雨公將若之何昨五月有恩百官受賜相公官既大物亦多有金銀器及錦衣等聞公受之面有喜色今歲大旱黎民阻飢公何不固辭金銀請賑倉廩懷寶衣錦於相公安乎百姓餓欲死公何不舉賢自代讓位請歸公三為相而天下之人皆以公為亢極矣夫物極則反人盛必衰日中則昃月滿則虧老子曰功成名遂身退天之道也今公富貴功成文章名遂唯身未退耳相公昔在南中自為嶽陽集有送别詩云誰念三千里江潭一老翁則知虞卿非窮愁不能著書以自見賈誼非流竄不能作賦以自安公當此時思欲生入京華老歸田里脫身瘴癘其可得乎今則不然忘往日之栖遲貪暮年之富貴僕恐前途更失後悔難追主上以相公為賢使輔佐社稷若棄德不讓是廢明君之舉豈曰能賢僕見相公事方急不可默諸桃李公聞人之言或中猶可收以桑榆詩曰投我以木瓜報之以瓊琚此言雖小可以喻大相公五君詠曰凄涼丞相府餘慶在玄成蘇公一聞此詩移相公于荆府積漸至相由蘇得也今蘇屈居益部公坐廟堂投木報瓊義將安在亦可舉蘇以自代然後為方朔之行抑又聞屋漏在上知之在下報國之重莫若進賢去年赦書云草澤卑位之間恐遺賢俊宜令兵部即作牒目徴召奏聞而吏部起請云試日等第全下者舉主量加貶削條目一行僕知天下父不舉子兄不舉弟向者百司諸州長官皆無才能之輩並是全軀保妻子之徒一入朝廷則恐出暫居州郡即思改豈有輕為進舉以取貶削今聞天下向有四百人應舉相公豈與四百人盡及第乎既有等差由此百司諸州長官懼貶削而不舉者多矣僕竊謂今之得舉者不以親則以勢不以賄則以交未必能鳴鼓四科而裹糧三道其不得舉者無媒無黨有行有才處卑位之間仄陋之下吞聲飲氣何足算哉何乃天子令有司舉之而相公令有司拒之則所謂欲德不用徒張此意事與京房易傳同故天以大旱相試也去年所舉縣令吏部一例與官舉若得人天何不雨賢俊之舉楚既失之縣令之舉齊亦未得夫有賢明宰相尚不能燮理隂陽而令庸才宰君豈即能緝熙風化相公必欲選良宰莫若舉前倉部員外郎吳太玄為洛陽令必欲舉御史中丞莫若舉襄州刺史靳蘄清輦轂之路非太玄不可生臺閣之風非蘄不可僕非吳靳親友但以知其賢明相公有而不知知而不用亦其過深矣抑又聞之昔閔子騫為政曰仍舊貫如之何何必改作凡校書正字一概不得入畿相公曽為此職見貞觀已來故事今吏部侍郎楊滔眼不識字心不好賢蕪穢我清司改張我舊貫去年冬請奏自今已後官無內外一例不得入畿即知正字校書不如一鄉縣尉明經進士不如三衛出身相公復此改張甄别安在古人有坐釣登相立籌封侯今僕無尚父之謀薛公之䇿徒以仕於書苑生於學門小道逢時大言祈相僕也幸甚幸甚去冬有詩贈公愛子協律其詩有句云官微思倚玉文淺怯投珠吕氏春秋云嘗一臠之肉知一鼎之味請公且看此十字則知僕曾吟五言則亦更有舊文願呈作者如公之用人蓋已多矣僕之思用其來久矣拾遺補闕寧有種乎僕雖不佞亦相公一株桃李也此書上論不雨隂陽乖度中願相公進賢為務下論僕身求用之路事繁而言不典理切而語多忤其善也必為執事所哂其惡也必為執事所怒倘哂既罷怒方解則僕當持舊文章而再拜來也韓偓天復初入翰林其年冬車駕出幸鳯翔偓有扈從之功返正初上面許偓為相奏云陛下運契中興當復用重德鎮風俗臣座主右僕射趙崇可以副陛下是選乞回臣之命授崇天下幸甚上嘉嘆翌日制用崇暨兵部侍郎王贊為相時梁太祖在京素聞崇之輕佻贊復有嫌釁馳入請見于上前具言二公長短上曰趙崇是偓薦時偓在側梁主叱之偓奏云臣不敢與大臣爭上曰韓偓出尋謫官入閩故偓有詩曰手風慵展八行書眼暗休看九局圖窗裏日光飛野馬案前筠管長蒲盧謀身拙為安蛇足報國危曾捋虎鬚舉世可能無默識未知誰復試齊竽崔皓薦樊衡書夫相州者九王之舊都西山雄崇足是秀異竊見縣人樊衡年三十神爽清悟才能絶倫雖白面書生有雄膽大略深識可以軌時俗長䇿可以安塞裔藏用守道實有歲年今國家封山勒崇希代罕遇含育之類莫不踴躍况詔徴隱逸州貢茂異衡之際會千載一時君侯復躬自執圭陪鑾日觀此州名藩必有所舉當是舉者非衡而誰伏願不棄賢才賜以甄奬得奔大禮升聞天朝衡因此時䇿名樹績報國榮家令當代之士知出君侯之門矣皓不勝區區敢聞左右俯伏階屏用增戰汗皓薦齊秀才書某官至辱垂下問令公舉一人可管記之任者愚以為軍中之書記節度使之喉舌指事立言而上達思中天心發號出令以下行期悅人意諒非容易而可専據竊見前進士髙陽齊孝若考叔年二十四學必専授文皆雅正詞賦甚精章表殊健疏眉目美風姿外若坦蕩中實畏慎執事倘引在幕下列於賓佐使其馳一檄飛書必能應馬上之急求言腹中之所欲夫掇芳刈楚不棄幽逺况孝若相門子弟射䇿甲科家居君侯之宇下且數年矣不勞重幣而獲至寶甚善甚善雄都大府多士如林最所知者斯人也請為閣下記其若此唯用與捨髙明裁之謹再拜李翺薦所知於徐州張僕射書翺載拜齊桓公不疑於其臣管夷吾信而霸天下合諸侯匡周室亡國存荆楚服諸侯無不至焉豎刁易牙信而齊國亂身死不及葬五公子爭立兄弟相反者數世桓公之信於其臣一道也所信者得其人則格於天地功及後世不得其人則不能免其身知人不易也豈唯霸者為然雖聖人亦不免焉帝堯之時賢不肖皆立於朝堯能知舜於是乎放歡兜流共工殛鯀竄三苗舉禹稷臯陶二十有二人加諸上位故堯崩三載四海之內遏密八音後世之人皆謂之帝堯焉向使堯不能知舜而遂尊歡兜共工之徒于朝禹稷臯陶之下二十有二人不能用則堯將不能得無為爾豈復得曰大哉堯之為君也唯天為大唯堯則之蕩蕩乎民無能名焉者哉春秋曰夏滅項孰滅之蓋齊滅之曷為不言齊滅之為桓公諱也春秋為賢者諱此滅人之國何賢爾君子之惡惡也疾始善善也樂終桓公嘗有繼絶存亡之功故君子為之諱也繼絶存亡賢者之事管夷吾用所以能繼絶存亡用賢耳矣豎刁易牙用則不能也向使桓公始不用管夷吾末有豎刁易牙爭權不葬而亂齊國則幽厲之諸侯也始用賢而終身諱其惡君子之樂用賢也如此始不用賢以及其終而幸後世之掩其過也則微矣然則居上位流德澤於百姓者何所勞乎勞于擇賢得其人措諸上使天下皆化之焉而已矣兹天子之大臣有土千里者孰有如閣下之好賢不倦者乎蓋得其人亦多矣其所求而得而不取者則有人焉隴西李觀竒士也伏聞閣下知其賢將用之未及而觀疾死昌黎韓愈得古人之遺風明于理亂根本之所由伏聞閣下復知其賢將用之未及而愈為宣武軍節度使之所用觀愈皆豪傑之士也如此人不時出觀自古天下亦有數百年無如其人者焉聞閣下皆得而知之皆不得而用之翺實為閣下惜焉豈惟翺一人而已後之讀前載者亦必多為閣下惜之矣兹有平昌孟郊賢士也伏聞閣下舊知之郊為五言詩自前漢李都尉蘇屬國及建安諸子南朝二謝郊能兼其體而有之李觀薦郊于梁肅補闕書曰郊之五言其有髙處在無上其有平處下顧兩謝韓愈送郊詩曰作詩三百首杳默咸池音彼二子皆知言者豈欺天下之人哉郊窮餓不得安養其親周天下無所遇作詩曰食薺腸亦苦強歌聲無歡出門即有礙誰謂天地寬其窮也甚矣復有張籍李景儉者皆竒才也未聞閣下知之凡賢士竒人皆有所負不茍合于世是以雖見之難得而知也見而不能知如勿見而已矣知其賢而不能用如勿知其賢而已矣用而不能盡其才如勿用而已矣能盡其才而容讒人之所間者如勿盡其才而已矣故見賢而能知知而能用用而能盡其才而不容讒人之所間者天下一人而已矣兹有二人焉偕來其一賢士也其一常常之人也待之禮貌不加隆焉則賢者往而常常之人日來矣况其待常常人加厚則善人何求而來哉孔子曰吾未見好德如好色者也賢人不好色而好德者也雖好色而不如好德者次也色與德均好者復其次也雖好德而不如好色者下也最甚不好德而好色者窮矣人有告曰某所有女國色也天下之人必竭其財求之而無愛矣有人告曰某所有人國士也天下之人則不能一往而先焉是豈非不好德而好色者乎賢者則宜有别於天下之人矣孔子述易定禮樂刪詩書作春秋聖人也奮乎百世之上其所化之者非其道則異端人也而孔子之廟存焉雖賢者亦不能日往而拜之以其益於人者寡矣故無益於人雖孔聖之廟猶不能朝夕而事焉有待於人而不能禮善人良士則不如無待也嗚呼人之降年不可與期郊將為他人所得而大有立於世與短命而死皆不可知也二者卒然有一於郊之體其為惜之不可既矣閣下終不得而用之矣雖恨之亦無可奈何矣翺窮賤人也直辭無讓非所宜至于此者也為道之存焉耳不直則不足以伸道也非好多言者也翺載拜贊曰舉孤棄讎聖人所美下展蔽善匹夫所鄙懿彼數公時行時止守道克勤薦賢不倚泠然所尚鴻儒不為矣唐托言卷六
