body:
  text: 唐托言卷八五代王定保撰通榜貞元十八年權德輿主文陸傪員外通榜帖韓文公薦十人於傪其上四人曰侯喜侯雲長劉述古韋紆其次六人張苰尉遲汾李紳張浚餘而權公凡三榜共放六人而苰紳浚餘不出五年內皆捷矣陸忠州榜時梁補闕肅王郎中傑佐之肅薦八人俱捷餘皆共成之故忠州之得人皆烜赫事見韓文公與陸傪員外書三榜裴公第一榜拾遺盧參預之第二第三榜諫議柳遜起居舍人于競佐之錢紫微珝亦頗通矣鄭皓都尉第一榜託崔雍員外為榜雍甚然諾皓從之雍第推延至榜除日皓待榜不至隕穫且至會雍遣小僮夀兒者傳云來蚤陳賀皓問有何文字夀兒曰無然日勢既暮夀兒且寄院中止宿皓亦懷疑因命搜夀兒懷袖一無所得皓不得已遂躬自操觚夜艾夀兒以一蠟彈丸進皓即榜也皓得之大喜狼忙札之一無更易主司撓悶貞元十一年吕渭第一榜撓悶不能定去留因以詩寄前主司曰獨坐貢闈裏愁多芳草生仙翁昨日事應見此時情隂注陽受楊嗣復第二榜盧求者李翺之壻先是翺典合淝郡有一道人詣翺自言能使鬼神翺謂其妖叱去既而謂翺曰使君胡不惜骨肉翺愈怒命繫於非所其夕內子心痛將絶頗為兒女所尤亟命召至謝焉道人唯唯而已翺待之以酒其人能劇飲數斗不能亂翺心敬憚以孺人之危為乞因請為翺奏章其妻尋愈翺叩頭致謝復謂翺曰所寫章不謹某向甚懼謫罰翺對以自扎固無錯誤其人微笑即探懷中得向所焚章果注一字翺益神之後翺任楚州或曰桂州其人復至其年楊嗣復知舉求落第嗣復翺之親表由是頗以求為慊因訪於道人道人言曰此細事亦可為奏章一通几硯紙筆復置醇酎數斗於側其人以巨杯引滿而飲寢少頃而覺覺而復飲暨罍恥即整衣冠北望而拜遽對案手疏二緘遲明授翺曰今秋有主司且開小卷明年見榜開大卷翺如所教尋遞中報至嗣復依前主文即開小卷詞云非頭黃尾三求六李翺竒之遂寄嗣復嗣復已有所貯頗疑漏泄及放榜開大卷乃一榜煥然不差一字其年裴俅為狀元黃價居榜末次則盧求耳餘皆契合後翺鎮襄陽其人復至翺虔敬可知也謂翺曰鄙人載來蓋仰公之政也因命出諸子熟視皆曰不繼翺無所得遂遣諸女出拜之乃曰尚書他日外孫三人皆位至宰輔後求子攜鄭亞子畋杜審權子讓能為將相夢鍾輻虔州南康人也始建山齋為習業之所因手植一松於庭際俄夢朱衣吏白云松圍三尺子當及第輻惡之爾來三十餘年輻方䇿名使人驗之松圍果三尺矣沈光始貢于有司嘗夢一海船自夢後咸敗於垂成暨登第年亦如是皆謂失之之夢而特地不測無何謝恩之際升階忽爾回飈吹一海圖拂光之面正當一巨舶即夢中所覩之物孫龍光偓崔淡下狀元及第前一年嘗夢積木數百偓踐履往復既而請一李處士圓之處士曰賀喜郎君來年必是狀元何者已居衆材之上也豫次匡廬其夕遙祝九天使者俄夢朱衣道人長丈餘特以青灰落衣襟霏霏然常自謂魚透龍門凡三經復透矣私心常慮舉事中輟既三舉矣欲罷不能於是四舉有司遂幸忝矣聽響卜畢諴相公及第年與一二同人聽響卜夜艾人稀久無所聞俄遇人投骨於地羣犬爭趨又一人曰後來者必銜得韋甄及第年事勢固萬全矣然未知名第髙下志在鼎甲未免撓懷俄聽於光德里南街忽覩一人叩一版門甚急良久軋然門開呼曰十三官尊體萬福既而甄果是第十三人矣自放狀頭杜黃門第一榜尹樞為狀頭先是杜公主文志在公選知與無預評品者第三場庭參之際公謂諸生曰主上誤聽薄劣俾為社稷求棟梁諸學士皆一時英雋奈無人相救時入䇿五百餘人相顧而已樞年七十餘獨趨進曰未諭侍郎尊旨公曰未有榜帖對曰樞不才公欣然延之從容因命卷簾授以紙筆樞援毫斯須而就每札一人則抗聲斥其姓名自始至末列庭聞之咨嗟嘆其公道者一口然後長跪授之唯空其元而已公覽讀致謝訖乃以狀元為請樞曰狀元非老夫不可公大竒之因命筆親自札之鄭損舍人光啓中隨駕在興元丞相陸公扆為狀元先是扆與損同止逆旅扆于時出丞相文忠公之門切於了却身事時已六月懇叩公希奏置舉場公曰奈時深夏復使何人主司扆曰鄭舍人其人也公然之因請扆致謝于損扆乃躬詣損拜請其榜帖皆扆自定遭遇貞元二年牛錫庶謝登蕭少保下及第先是昕寶應二年一榜之後爾來二紀矣國之耆老殆非俊造馳騖之所二子久屈場籍其年計偕來主文頗以耕鑿為急無何並馳人事因回避朝客誤入昕第昕岸幘倚杖謂二子來謁命左右延接二子初未知誰也潛訪於閽吏吏曰蕭尚書也因各以常行一軸面贄大蒙稱賞昕以久無後進及門見之甚喜因留連竟日俄有一僕附耳昕盼二子囅然既而上列繼至二子隱於屏後或曰二十四年載主文柄國朝盛事所未曾有二子聞之亦不意是昕猶慮數刻淹留失之善地朝士既去二子辭昕面告之復許以髙第竟如所諾友放王相起長慶中再主文柄志欲以白敏中為狀元病其人與賀拔惎為交友惎有文而落拓因密令親知申意俾敏中與惎絶前人復約敏中為具以待之敏中欣然曰皆如所教既而惎果造門左右紿以敏中他適惎遲留不言而去俄頃敏中躍出連呼左右召惎於是悉以實告乃曰一第何門不可致奈輕負至交相與歡醉負陽而寢前人覩之大怒而去懇告於起且云不可必矣起曰我比只得白敏中今當更取賀拔惎矣誤放包誼者江東人也有文詞初與計偕到京師後時趂試不及宗人祭酒佶憐之館於私第誼多遊佛寺無何唐突中書舍人劉太真覩其色目舉人也命一介致問誼勃然曰進士包誼素不相識何勞要問太真甚銜之以至専訪其人於佶佶聞誼所為大怒而忌之因詰責遣徙他舍誼亦無怍色明年太真主文志在致其永棄故過雜文俟終場明遣之既而自悔之曰此子既忤我從而報之是淺為丈夫也必矣但能永廢其人何必在此於是放入䇿太真將放榜先巡宅呈宰相榜中有姓朱人及第宰相以朱泚近大逆未欲以此姓及第亟遣易之太真錯􅌓趨出不記他人唯記誼爾及誼謝恩方悟已所惡也因明言乃知得喪非人力也蓋假手而已鄭侍郎董主文誤謂顔標乃魯公之後時徐方未寧志在激勸忠烈即以標為狀元謝恩日從容問及廟院標曰標寒進也未嘗有廟院薰始大悟塞默而已尋為無名子所嘲曰主司頭腦太冬烘錯認顔標作魯公憂中有喜公乘億魏人也以詞賦著名咸通十三年垂三十舉矣嘗大病鄉人誤傳已死其妻自河北來迎喪會億送客至坡下遇其妻始夫妻濶别積十餘嵗億時在馬上見一婦人粗縗跨驢依稀與妻類因睨之不已妻亦如是乃令人詰之果億也億與之相持而泣路人皆異之後旬日登第矣為鄉人輕視而得者許棠宣州涇縣人蚤修舉業鄉人汪遵者幼為小吏洎棠應二十餘舉遵猶在胥徒然善為絶句詩而深自晦密一旦辭役就貢會棠送客至灞滻間忽遇遵於途中棠訊之曰汪都都者吏之呼也何事至京遵對曰此來就貢棠怒曰小吏無禮而與棠同硯席棠甚侮之後遵成名五年棠始及第以賢妻激勸而得者彭伉湛賁俱𡊮州宜春人伉妻即湛姨也伉舉進士擢第湛猶為縣吏妻族為置賀宴皆官人名士伉居客之右一座盡傾湛至命飯於後閣湛無難色其妻忿然責之曰男子不能自勵窘辱如此復何為容湛感其言孜孜學業未數載一舉登第伉嘗侮之時伉方跨長耳縱遊於郊忽有僮馳報湛郎及第伉失聲而墜故𡊮人謔曰湛郎及第彭伉落驢已落重收顧非熊况之子滑稽好辨凌轢氣熖子弟為衆所怒非熊既為所排在舉場三十年屈聲聒人耳長慶中陳商放榜上怪無非熊名詔有司追榜放及第時天下寒進皆知勸矣詩人劉得仁賀詩曰愚為童稚時已解念君詩及得髙科晚須逢聖主知元和九年韋貫之榜殷堯藩雜文落矣楊漢公尚書乃貫之前榜門生盛言堯藩之屈貫之為之重收或曰李景讓以太夫人有疾報堂請暫省侍路逢楊虞卿懇稱班圖源之屈因而得之也貞元中李繆公先榜落矣先是出試楊員外於陵省宿歸第遇程於省司詢之所試程探靿中得賦藁示之其破題曰德動天鑒祥開日華於陵覽之謂程曰公今年須作狀元翌日雜文無名於陵深不平乃於故䇿子末繕寫而斥其名氏攜之以詣主文從容紿之曰侍郎今者所試賦奈何用舊題主文辭以非也於陵曰不止題目向有人賦次韻腳亦同主文大驚於陵乃出程賦示之主文歎賞不已於陵曰當今場中若有此賦侍郎何以待之主文曰無則已有則非狀元不可也於陵曰茍如此侍郎已遺賢矣乃李程所作亟命取程所納面對不差一字主文因而致謝於陵於是請擢為狀元前榜不復收矣或曰出榜重收放老天復元年杜德祥榜放曹松王希羽劉象柯崇鄭希顔等及第時上新平內難聞放新進士喜甚詔選中有孤平屈人宜令以名聞特勑授官故德祥以松等塞詔各受正制略曰念爾登科之際當豫反正之年宜降異恩各膺寵命松舒州人也學賈司倉為詩此外無他能時號松啓事為送羊腳狀希羽歙州人也詞藝優博松希羽甲子皆七十餘象京兆人崇希顔閩中人皆以詩卷及第亦皆年逾耳順矣時謂五老榜及第與長行拜官相次楊敬之拜國子司業次子戴進士及第長子三史登科時號楊三喜崔昭矩大順中裴公下狀元及第翌日兄昭緯登庸王倜丞相魯公損之子倜及第翌日損登庸王倜過堂别見歸黯親迎拜席日狀元及第榜下版巡脫白期月無疾而卒别頭及第别頭及第始於上元二年錢令緒鄭人政王悌崔志恂第四人亦謂之承優及第楊嚴等會昌四年王起奏五人楊知至刑部尚書汝士之子源重故相牛僧孺之甥鄭朴河東節度使崔元式女壻楊嚴監察御史發之弟竇緘故相易直之子恩旨令送所試雜文付翰林重考覆續奉進旨楊嚴一人宜與及第源重四人落下時楊知至因以長句呈同年曰由來梁燕與𡨕鴻不合翩翾向碧空寒谷謾勞鄒氏律長天獨遇宋都風此時泣玉情雖異他日銜環事亦同三月春光正搖蕩無因得醉杏園中及第後隱居費冠卿元和二年及第以祿不及親永懷罔極之念遂隱于九華長慶中殿中侍御史李行修舉冠卿孝節徵拜右拾遺不起制曰前進士費冠卿嘗與計偕以文中第歸不及於榮養恨每積於永懷遂乃屏迹丘園絶蹤仕進守其至性十有五年峻節無雙清飈自逺夫旌孝行舉逸人所以厚風俗而敦名教也宜承髙奬以警薄夫擢參近侍之榮載佇移忠之效可右拾遺施肩吾元和十年及第以洪州之西山乃十二真君羽化之地靈迹具存慕其真風髙蹈於此常賦間居遣興詩一百韻大行於世皇甫頴早以清􅋵著稱乾符中及第時四郊多壘頴以垂堂之誡絶意祿位隱於鹿門别墅尋以疾終入道戴叔倫貞元中罷容管都督上表請度為道士蕭俯自左僕射表請度為道士蔣曙中和初自起居郎以弟兄因亂離遂屏迹丘園因應天令節奏請入道從之顧况全家隱居茅山竟莫知所止其子非熊及第歸慶既莫知况寧否亦隱於舊山或聞有所遇長生之祕術也論曰士之謀身得之者以才失之者惟命達失二揆𢎞道要樞可謂勤於修己者與茍昧於斯繫彼能否臨深履薄岐路紛如得之則恃已所長失之則尤人不盡干祿之子能不慎諸及知命也者足以引之而排觖望不足倚之而圗富貴倚之則事怠怠則智性昏引之則感通通則尤怨弭故孔孟之言命蓋厄窮而已矣有若立身慎行與聖哲同轍者則得喪語默復何蠆芥乎復何穹隆乎然士有死而不忘者恩與知而已矣包子之誤放李翺之奏章足以資笑談不足以彰事實有功成身退𡨕心希夷者吾不得而齒矣唐托言卷八
