body:
  text: 唐托言卷十一五代王定保撰反初及第劉軻慕孟軻為文故以名焉少為僧止于豫章髙安縣南果園後求黃老之術隱於廬山既而進士登第文章與韓柳齊名反初不第張䇿同文子也自小從學浮圖法號藏機粲名內道場為大德廣明庚子之亂趙少師崇主文䇿謂時事更變求就貢籍崇庭譴之䇿不得已復舉博學宏詞崇職授天官復黜之仍顯揚其過䇿後為梁太祖從事天祐中在翰林太祖頗竒之為謀府䇿極力媒孽崇竟罹寃酷無官受黜襄陽詩人孟浩然開元中頗為王右丞所知句有微雲淡河漢疏雨滴梧桐者右丞吟咏之常擊節不已維待詔金鑾殿一旦召之商較風雅忽遇上幸維所浩然錯愕伏床下維不敢隱因之奏聞上欣然曰朕素聞其人因得詔見上曰卿將得詩來耶浩然奏曰臣偶不齎所業上即命吟浩然奉詔拜舞念詩曰北闕休上書南山歸卧廬不才明主棄多病故人疏上聞之憮然曰朕未曾棄人自是卿不求進奈何反有此作因命放歸南山終身不仕賈閬仙名島元和中元白尚輕淺島獨變格入僻以矯浮艷雖行坐寢食吟咏不輟常跨驢張蓋橫截天衢時秋風正厲黃葉可掃島忽吟曰落葉滿長安志重其衝口直致求之一聮杳不可得不知身之所從也因之唐突大京兆劉栖楚被繫一夕而釋之又嘗遇武宗皇帝於定水精舍島尤肆侮上訝之他日有中旨令與一官謫去乃授長江縣尉稍遷普州司倉而卒開成中溫庭筠才名籍甚然罕拘細行以文為貨識者鄙之無何執政間復有惡奏庭筠攪擾場屋黜隨州縣尉時中書舍人裴坦當制忸怩含毫久之時有老吏在側因訊之升黜對曰舍人合為責詞何者入䇿進士與望州長馬一齊資坦釋然故有澤畔長沙之比庭筠之任文士詩人爭為詞送唯紀唐夫得其尤詩曰何事明時泣玉頻長安不見杏園春鳳皇詔下雖霑命鸚鵡才髙却纍身且飲緑醽銷積恨莫辭黃綬拂行塵方城若比長沙逺猶隔千山與萬津薦舉不捷張祜元和長慶中深為令狐文公所知公鎮天平日自草薦表令以新舊格詩三百篇表進獻辭略曰凡製五言苞含六義近多放誕靡有宗師前件人久在江湖蚤工篇什研機甚苦搜象頗深輩流所推風格罕及云云謹令録新舊格詩三百首自光順門進獻望請宣付中書門下祜至京師方屬元江夏偃仰內庭上因召問祜之詞藻上下稹對曰張祜雕蟲小巧壯夫恥而不為者或奬激之恐變陛下風教上頷之由是寂寞而歸祜以詩自悼略曰賀知章口徒勞説孟浩然身更不疑長沙日試萬言王璘詞學富贍非積學所致崔詹事亷問特表薦之於朝先是試之於使院璘請書吏十人皆給筆硯璘縝絺捫腹往來口授十吏筆不停輟首題黃河賦三千字數刻而成復為鳥散餘花落詩二十首援毫而就時忽風雨暴至數幅為回飈所卷泥滓沾漬不勝舒卷璘曰勿取但將紙來復縱筆一揮斯須復十餘篇矣時未亭午已搆七千餘言詹事傳語試官曰萬言不在試限請屈來飲酒黃河賦復有僻字百餘請璘對衆朗宣旁若無人至京師時路庶人方當鈞軸遣一介召之璘意在沽激曰請俟見帝巖聞之大怒亟命奏廢萬言科璘杖䇿而歸放曠於杯酒間雖屠沽無間然矣已得復失楊知至會昌五年王僕射重奏五人源重楊知至楊嚴鄭朴竇緘奉敕特放楊嚴其餘四人皆落知至感恩自弔詩曰由來梁燕與冥鴻不合翩翾向碧空寒谷謾隨鄒氏律長天獨遇宋都風當時泣玉情雖異他日銜環事亦同二月春光花淡蕩無因得醉杏園中張濆會昌五年陳商下狀元及第翰林覆落濆等八人趙渭南貽濆詩曰莫向春風訴酒杯謫仙真個是仙才猶堪與世為祥瑞曾到蓬山頂上來以德報怨裴垍舉宏詞崔樞考之落第及垍為宰相擢樞為禮部笑謂樞曰聊以報德也賈泳父翛有義聲泳落拓不拘細碎常佐武臣倅晉州昭宗幸蜀三榜裴公時為前主客員外客遊至郡泳接之傲睨公嘗簪笏造泳泳戎裝一揖曰主公尚書邀放鷂子勿怪如此倥偬而退贄頗銜之後公三主文柄泳兩舉為公所黜既而謂門人曰賈泳潦倒可哀吾當報之以德遂放及第惡分疏宋人許晝閩人黃遘遘嘗宰滑州衛南與晝聲迹不疏光化三年二人俱近事遘謗晝嘗笞背矣晝性卞急時內翰吳融侍郎西銓獨孤損侍郎皆晝知己一旦晝造二君子自辨因袒而視之二公皆掩袂而入晝遘其年俱落光化中蘇拯與鄉人陳滌同處拯與考功蘇郎中璞初敘宗黨璞故奉常滌之子也拯既執贄尋以啓事溫卷因請陳滌緘封滌遂誤書已名璞得之大怒拯聞之蒼黃復致書謝過吳子華聞之曰此書應更歡也文德中劉子長出鎮浙西行次江西時陸威侍郎猶為郎吏亦寓於此進士禇載緘二軸投謁誤以子長之卷面贄於威威覽之連有數字犯威家諱威因拱而矍然載錯􅌓白以大誤尋以長箋致謝略曰曹興之圖畫雖精終慙誤筆殷浩之兢持太過翻達空函怨怒戅直附李義山師令狐文公大中中趙公在內廷重陽日義山謁不見因以一篇紀于屏風而去詩曰曾共山公把酒巵霜天白菊正離披十年泉下無消息九日樽前有所思莫學漢臣栽苜蓿還同楚客詠江蘺郎君漸貴施行馬東閣無因更重窺張曙崔昭緯中和初西川同舉相與詣日者問命時曙自恃才名籍然人皆呼為將來狀元崔亦分居其下無何日者殊不顧曙目崔曰將來萬全髙第曙有愠色日者曰郎君亦及第然須待崔家郎君拜相當於此時過堂既而曙果以慘恤不終場昭緯其年首冠曙以篇什刺之曰千里江山陪驥尾五更風水失龍鱗昨夜浣花溪上雨緑楊芳草屬何人崔甚不平會夜飲崔以巨觥飲張張推辭再三崔曰但喫却待我作宰相與你取狀頭張拂衣而去因之大不叶後七年崔自內廷大拜張後於三榜裴公下及第果於崔公下過堂崔珏佐大魏公幕與副車𡊮充常侍不叶公俱薦之於朝崔拜藝閣讐校縱舟江滸會有客以絲桐詣公公善之而欲振其名命以乘馬迎珏共賞絶藝珏應召而至公從容為客請一篇珏方懷拂鬱因以發泄所蓄詩曰七條絃上五音寒此藝知音自古難唯有河南房次律始終憐得董庭蘭公大慙恚張楚與達奚侍郎書公橫海殊量千霄偉材鬱為能賢特負公望雄筆麗藻獨步當時峻節清心髙邁流俗其為御史也則察視臧否糾遏姦邪其為郎官也則彌綸舊章發揮清議其拜舍人也則専掌綸綍翺翔掖垣其遷侍郎也則綜核才名規模禮物良由心照明鏡手握純鈎龍門少登鵬翼孤運猶且謙能下士貴不易交頃辱音書恍若會面眷顧之重宿昔不渝執玩徘徊緘藏反覆伐木之詩重作採葵之詠再興何慰如之幸甚幸甚僕誠鄙陋素乏異能直守愚忠每存然諾背憎噂􅊱少小不為蘧蒢戚施平生所恥故得從遊君子厠迹周行歡會之間常多企慕聊因翰墨輒寫芻蕘公往在臨淄請僕為曹掾喜奉顔色得接徽猷美景良辰必然邀賞斗酒臠肉何曾暫忘分若芝蘭堅逾膠膝時范穆二子俱在屬城僕濫同人見稱四友嘗因醉後遂論晚慕官資衆識許公榮陽勃然不顧公誠相期於下郡咸及為榮志氣之間懸殊久矣今范郎中永逝穆司直尋殂唯僕尚存得觀榮貴此疇昔之情一也尋應制舉同赴洛陽是時春寒正值雨雪俱乘欵段莫不艱辛朝則齊鑣夜還連榻行邁靡靡中心搖搖及次新鄉同為口號公先曰太行松雪映出青天僕答曰淇水煙波半含春色向將百對盡其一時發則須酬遲便有罰並無所屈斯可為歡此疇昔之情二也初到都下同止客坊蚤已酸寒復加屯躓屬公家豎逃逸竊藏無遺賴僕僑裝未空同㸑斯在殆過時月以盡有無巷雖如窮坐客常滿還復嘲謔頗展歡娛公詠僕以衣袖障塵僕詠公以漿粥和酒復有憨嫗提攜破筐頻來掃除共為笑㺯此疇昔之情三也公授鄭縣歸迎板輿僕已罷官時為貧士於焉貰酒猶出荒郊候得軒車便成野酌留連數日欵曲襟懷旋愴分離逺行追送他鄉旅寓摻袂悽然雖限山川常懷夢想此疇昔之情四也公在畿甸僕尉長安多陪府庭是稱聨吏數遊魏十四華館頻詣武七芳筵婉孌心期綢繆宴語應接無暇取與非他車公若無悒然不樂黃生未見鄙吝偏形此疇昔之情五也公遷侍御僕忝起居執法記言連行供奉舉目相見為歡益深煥爛玉除之前馥郁香爐之下仰戴空極盡覩朝儀若在鈞天如臨玄圃此疇昔之情六也僕轉郎署先在祠曹公自臺端俯臨禮部昔稱同舍今則同廳退朝每得陪行就食尋常接坐攀由鴻鵠倚是蒹葭咫尺餘光環回末職官連兩載事等一家此疇昔之情七也復考進士文䇿同就侍郎廳房信宿重闈差池接席掎托之務仰止彌髙于時賢郎幼年詞翰公以本司恐謗不議祁奚僕聞善必驚是敬王粲驟請座主超升甲科今果飛騰已遷京縣雖云報國亦忝知人此疇昔之情八也凡人有一于此猶有可論况僕周旋若斯足成深契所以具申前好用呈寸心非欲稱揚故為繁冗今公全德之際願交者多昔公未達之前欲相知者少於多甚易在少誠難則公居甚易之時下走處誠難之日本以義分相許非勢利相趨蚤為相國所知纍遷官守其在銓管也用僕為京兆掾其在台衡也用僕為尚書郎隻字片言曾蒙激賞連讒被謗備與辨明察于危難之情知在名教之地後緣疏惰自取播遷顧三省而多慙甘一黜而何贖歷司馬長史再佐任治中萬里山川七周星嵗從閩適越染瘴纒疴比先支離更加枯稿盡作班鬢難為壯心常情尚有咨嗟故舊能無歎息非辭坎壈但愧揶揄遍觀昔人沉淪多因推薦其有超然却貴自達十不二三以管仲之賢須逢鮑叔以陳平之智須遇無知以諸葛之才見稱徐庶以禰衡之俊見藉孔融如此之流不可稱數其於樗散必待吹噓如公顧盻生光剪拂增價豈忘朽株之事而輕連茹之詞乎即有言而莫從未有不言而自致世稱王陽在位貢禹彈冠彼亦何哉非敢望也復恐傍人疏間貝錦成章僕既無負于他人人豈有嫌於僕愚之竊料當謂不然彼欲加諸復難重爾嘗試大抵如之或在蒼黃或於疑似都由聽授不至分明便起猜嫌俄成釁隙亷藺獨能生覺蕭朱杳不深知偹出時談可為殷鑒且今之從政必也擇人若非文儒祇應吏道僕于藻翰留意則下筆成章僕于幹蠱専精則操刀必割歷官一十五任入事三十餘年夫琢玉為器者尚掩微瑕僝木為輪者猶藏小節僕縱有短身還有長至如髙班要津聽望已久小郡偏州常才為之嗟乎不與其間益用惆悵要欲知其某郡太守以示子孫未知生涯幾何竟當遂否天不可問人欲奚為然則同時郎官及餘親故自僕貶黜之後亡者三十餘人皆負聲華豈無知己不與年夀相次殁于泉扃有若范宣城等就中深密最與追從亦思題篇匪朝即夕索然皆盡非慟而誰不奈吾儕多從鬼録獨求榮進實愧無厭向前借譽於公是謬自頃探釋氏若空之説覽莊生齊物之言寵辱何殊喜愠無别希求速進者未必以前有永甘棄廢者未必以後無倚伏難知吉凶何定朝榮暮落始富終貧范卷簀而後榮鄧賜錢而餓死當黥而貴折臂猶亨翻覆何定波瀾飄飄風雨任運推轉何必越性干祈但以鄴城最當官路使命往來賔客縱橫馬少憩鞍人當倒屣俸祿供幣蓋不足云筋力漸衰故難堪也倘少乖阻即起憾詞誠兼濟之義存若屢空而理在加以物務牽率形役徒勞幸有田園在于河內控帶泉石交映林亭密邇太行尤豐藥物素書數千卷足覽古今子姪五六人薄間詩賦兼令佐酒何處生愁更引圍碁别成招隱風來北牖月出東岑往往觀魚時時夢蝶唯開一徑懶問四鄰潘嶽於是間栖梁竦由其罷歎行將謝病自此歸耕倘不遂微誠明神是殛逺陳本末之事庶體行藏之心秋中漸涼唯納休謐出處方異會合無期願以加飱匪惟長憶不具張楚白任華戅直上嚴大夫箋逸人姓任名華是曾作藝省校書郎者輒敢長揖俾三尺之童奉箋于御史大夫嚴公麾下僕隱居巖壑積有嵗年銷宦情于浮雲擲世事于流水今者輟魚釣詣旌麾非求榮非求利非求名非求媚是將觀公俯仰窺公淺深何也公若帶驕貴之色移夙昔之眷自謂威足凌物不能禮接于人則公之淺深於是見矣公若務于招延不隔卑賤念半靣之曩日回青眼於片時則公之厚德未易量也惟執事少留意焉且君子成人之美僕忝士君子之末豈敢不成公之美事乎是將授公藥石之言療公膏肓之疾未知雅意欲聞之乎必欲聞之則當先之以卑詞申之以喜色則膏肓之疾不勞扁鵲而自愈矣公其善聽之何者當今天下有譏諫之士咸皆不減于先侍郎矣然失在于倨闕在于怒且易曰謙謙君子卑以自牧論語曰君子之道忠恕而已矣公之頃者似不務此道非恐乖于君子亦應招怒于時人禍患之機怨讎之府豈在利劍相擊拔戟相撞其亦在于辭色相干拜揖失節則潘安仁以孫季獲罪嵇叔夜為鍾會所圖古來此類蓋非一也公所明知之又安可不以為深誡乎必能遇士則誡於倨撫下則𢎞以恕是可以長守富貴而無憂危公成人之美在此而已矣念之哉任華一野客耳用華言亦唯命不用華言亦唯命明日當拂衣而去矣不知其他華與庾中丞書中丞閣下公久在西掖聲華滿路昨遷拜中憲臺閣生風甚善甚善華竊有所怪請試言之何者華自去冬拜謁偏承眷顧幸辱以文章見許以補衮相期衆君子聞之當仁矣華請陪李太僕詣闕庭公乃謂太僕曰任子文辭可為卓絶負寃已久何不奏與太僕丞華也不才皆非所望然公之相待何前緊而後慢若是耶豈華才減于前日而公之恩遇薄于兹辰退思伏念良增歎惋耳況華嘗以三數賦筆奉呈於公展手札云足下文格由來髙妙今所寄者尤更新竒公言之次敢忘推薦朝廷方以振舉遺滯為務在中丞今日得非公言之次乎當公言之次曾不聞以片言見及公其意者豈欲棄前日之信乎華本野人常思漁釣尋常杖䇿歸乎舊山非有機心致斯扣擊但以今之後進咸屬望於公公其留意焉不然後進何望矣任華頓首華與京尹杜中丞書中丞閣下僕常以為受人恩不易何以言之昔辟陽侯欲與朱建相知建不與相見無何建母喪家貧假貸服具而辟陽侯乃奉百金往稅焉及辟陽侯邅讒而竟獲免者建之力也其後淮南王以諸吕之故誅辟陽侯而建以曾往來亦受其禍是知相知之道乃是禍福存亡之門固不易耳僕一到京華常以孤介自處終不能結金張之援過衛霍之廬茍或見招輒以辭避所以然者以朱建自試耳昨不意執事猥以文章見知特於名公大臣曲垂剪拂由是以公為知己矣亦嘗造詣門館公相待甚厚談笑怡如僕由是益知公懿德𢎞逺必能永保貞吉而與人有終始之分不然何乃前日輒不自料而有所丐於公哉若道不合雖以王侯之貴親御車相迎或以千金為夀僕終不顧況肯䇿款假﨑嶇傍人門庭開強言乎矧僕所求不多公乃曰亦不易致即當分減然必若易致則己自致矣安能煩於公且凡有濟物之心必能輟于己方可以成濟物之道公乃曰分減豈輟已之義哉況自蒙見許已經旬日客舍傾聽寂寥無聲公豈事繁遺忘耶當不至遺忘以為間事耶今明公位髙望重又居四方之地若失於信而薄于義則四方無所取唯公留意耳任華頓首華告辭京尹賈大夫書大夫閣下昔侯嬴邀信陵君車騎過屠門而信陵為之執綏此豈辱公子耶乃所以成公子名耳王生命廷尉結襪廷尉俯僂從命無難色此豈辱廷尉乎亦以成廷尉之名耳僕所邀明公枉車過陋巷者豈徒欲成君子之名而已哉竊見天下有識之士品藻當世人物或以君子之才望美則美矣猶有所闕焉其所闕者在于恃才傲物耳僕感君國士之遇故以國士報君其所以報者欲洗君恃才傲物之過而補君之闕宜其允迪忠告惠然來思而乃躊躇數日不我顧意者恥從賣醪博徒者遊乎觀君似欲以富貴驕僕乃不知僕欲以貧賤驕君君何見之晚耶抑又聞昔有躄者恥為平原君家美人所笑乃詣平原君請笑者頭平原君雖許之終所不忍居無何賓客别去過半君怪之有一客對曰以君不殺笑躄者因君為愛色而賤士平原君大驚悔過即日斬美人頭造躄者門謝焉賔客由是復來今君猶惜馬蹄不顧我況有請美人頭者豈復得哉僕亦恐君之門客於是乎解體僕即解體者也請從此辭任華頓首崔國輔上何都督履光書崔國輔謹上書於都督何公節下昨有自府庭而退者云君公垂責以為怠于奉上之禮死罪死罪竊聞禮不妄恱人為近佞媚也不好狎自全仁義也故教訓正俗非禮不偹君臣上下非禮勿定宦學事師非禮勿親所以君子恭敬撙節退讓以明禮修身踐言合道以成禮今人無禮多涉於佞媚不全於仁義故以難進而易退孜孜善行者為失禮悲夫古之有禮者貴今之有禮者賤雖然君子終身不棄禮為茍容詩云風雨如晦雞鳴不已言善人不拘俗也國輔常見君公有謀贊之能明恤之量敢以大雅之道而事君公殊不知君公以凡徒見待君公聞叔向乎聞張良乎夫叔向者不能言退然不勝衣為晉國之望張良婦女之狀未嘗臨陳為漢庭之傑蕭曺為刀筆吏碌碌無竒節百里奚在虞而虞亡在秦而秦霸屈原之忠貞逐於楚張儀之利口鞭于梁皆士之屯蒙莫能自異僕今日復何言哉朱灣别湖州崔使君書灣聞蓬萊之山藏杳冥之中行可到貴人之門無媒而通不可到驪龍之珠潛于瀇滉之中或可識貴人之顔無因而前不可識某自假道路問津主人一身孤雲兩度圓月凡載詣執事三趨戟門門人謂某曰子私來耶公來耶若言公小子實非公若言私公庭無私不得入以兹交戰倣徨于今信知庭之與堂不啻千里況寄食漂母夜眠漁舟門如龍而難登食如玉而難得食如玉之粟登如龍之門如龍之門轉深如玉之粟轉貴實無機心翻成機事漢陰丈人聞之豈不大笑屬溪上風便囊中金貧望甘棠而歎自引分而退論曰夫子云口無擇言身無擇行言之遜人不以為諂言之危人不以為訐蓋言與行契行由言立故生人以來未有如夫子之聖者儒有用言干進幾乎若乃交道匪終得言紀之者時則有其人矣唐托言卷十一
