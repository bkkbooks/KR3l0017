body:
  text: 唐摭言卷一五代王定保撰統序科第周禮鄉大夫具鄉飲酒之教考其徳行察其道藝三年舉賢者貢于王庭非夫鄉舉里選之義源于中古乎夫子聖人始以四科齒門弟子後王因而範之漢革秦亂講求典禮亦解循塗守轍以須賢俊考徳行則升孝廉而激浮俗掄道藝則第雋造而廣人文故郡國貢士無虛歲矣繇是天下上計集于大司徒府所以顯五教于萬民者也我唐㳂隋法漢孜孜矻矻以羅草澤琴瑟不改而清濁殊塗丹漆不施而豐儉異致始自武徳辛巳歲四月一日勅諸州學士及蚤有明經及秀才俊士進士明于理體為鄉里所稱者委本縣考試州長重覆取其合格每年十月隨物入貢斯我唐貢士之始也厥有㳂革録之如左貢舉釐革并行鄉飲酒開元二十五年二月勅應諸州貢士上州歲貢三人中州二人下州一人必有才行不限其數所宜貢之人解送之日行鄉飲禮牲用少牢以官物充㑹昌五年舉格節文公卿百寮子弟及京畿内士人寄客外州府舉士人等修明經進士業者並𨽻名所在監及官學仍精加考試所送人數其國子監明經舊格每年送三百五十人今請送二百人進士依舊格送三十人其𨽻名明經亦請送二百人其宗正等進士送二十人其東監同華河中所送進士不得過三十人明經不得過五十人其鳯翔山南西道東道荆南鄂岳湖南鄭滑浙西浙東鄜坊宣商涇邠江南江西淮南西川東川陜虢等道所送進士不得過一十五人明經不得過二十人其河東陳許汴徐泗易定齊德魏博澤潞幽孟靈夏淄青鄆曹兖海鎮冀麟勝等道所送進士不得過一十人明經不得過十五人金汝鹽豐福建黔府桂府嶺南安南邕容等道所送進士不得過七人明經不得過十人其諸支郡所送人數請申觀察使為解都送不得諸州各自申解諸州府所試進士雜文據元格並合封送省准開成三年五月三日勅落下者今緣自不送所試以來舉人公然拔解今諸州府所試各須封送省司檢勘如病敗不近詞理州府妄給解者試官停見任用闕述進士上篇永徽已前俊秀二科猶與進士並列咸亨之後凡由文學舉于有司者競集于進士矣繇是趙傪等嘗刪去俊秀故目之曰進士登科記古者閭有序鄉有庠以時教行禮而視化焉其有秀異者則升于諸侯之學諸侯歲貢其尤著者移之于天子升于太學故命曰造士然後命焉周禮大樂正論造士之秀者以告于王而升諸司馬司馬論辨官材論進士之賢者以告于王而定其論論定然後官之任官然後爵之位定然後禄之若列之于科目則俊秀盛于漢魏而進士隋大業中所置也如侯君素孫伏伽皆隋之進士也明矣然彰于武徳而甲于貞觀盖文皇帝修文偃武天贊神授嘗私幸端門見新進士綴行而出喜曰天下英雄入吾彀中矣若乃光宅四海垂祚三百何莫由斯之道者也述進士下篇元和中中書舍人李肇撰國史補其畧曰進士為時所尚久矣是故俊乂實在其中由此而出者終身為文人故争名常為時所重其都會謂之舉場通稱謂之秀才投刺謂之鄉貢得第謂之前進士互相推敬謂之先輩俱捷謂之同年近年及第未過闗試皆稱新及第進士所以韓中丞儀嘗有知聞近過闗試儀以一篇紀之曰短行納了付三銓休把新銜惱必先今日便稱前進士好留春色與明年有司謂之座主京兆府考而升者謂之等第外府不試而貢者謂之拔解然拔解亦須預托人為詞賦非謂白薦將試各相保謂之合保羣居而賦謂之私試造請權要謂之闗節激揚聲價謂之還往既捷列名于慈恩寺塔謂之題名大宴于曲江亭子謂之曲江會曲江大會在闗試後亦謂之闗宴宴後同年各有所之亦謂之為離會藉而入選謂之春闗不捷而醉飽謂之打眊矂匿名造謗謂之無名子退而肄業謂之過夏執業以出謂之夏課亦謂之秋卷挾藏入試謂之書䇿此其大畧也其風俗繫于先達其制置存于有司雖然賢者得其大者故位極人臣常十有二三登顯列十有六七而元魯山張睢陽有焉劉闢元翛有焉散序進士進士科始于隋大業中盛于貞觀永徽之際搢紳雖位極人臣不由進士者終不為美以至歲貢常不減八九人其推重謂之白衣公卿又曰一品白衫其艱難謂之三十老明經五十少進士其負倜儻之才變通之術蘇張之辨説荆聶之膽氣仲由之武勇子房之籌畫𢎞羊之書計方朔之詼諧咸以是而晦之修身慎行雖處子之不若其有老死于文場者亦所無恨故有詩云太宗皇帝真長䇿賺得英雄盡白頭獨孤及撰河南府法曹參軍張從師墓誌云從師祖損之隋大業中進士甲科位至侍御史諸曹員外郎損之生汯以碩學麗藻名動京師亦舉進士自監察御史為會稽令兩監按實録西監隋制東監龍朔元年所置開元以前進士不由兩監者深以為恥李華員外寄趙七侍御詩畧曰昔日蕭邵友四人才成童華與趙七侍御驊蕭十功曹穎士故邵十六司倉軫未冠逰太學皆苦貧共被四人登科相次典校邵後二年擢第以寃橫貶卒南中又郭代公崔湜范履氷輩皆由太學登第李肇舍人撰國史補亦云天寶中𡊮咸用劉長卿分為朋頭是時常重兩監爾後物態澆漓稔于世禄以京兆為榮美同華為利市莫不去實務華棄本逐末故天寶二十載勅天下舉人不得言鄉貢皆須補國子及郡學生廣徳二年制京兆府進士並令補國子生斯乃救壓覆者耳奈何人心既去雖拘之以法猶不能勝矧或執大政者不常其人所立既非自我則所守亦不堅矣繇是貞元十年已來殆絶于兩監矣貞觀五年已後太宗數幸國學遂增築學舍一千二百間增置學生凡三千二百六十員無何高麗百濟新羅高昌吐畨諸國酋長亦遣子弟請入國學之内八千餘人國學之盛近古未有至永淳以後乃廢龍朔二年九月勅學生在學各以長幼為序初入學皆行束脩之禮各絹三匹四門學生各絹二匹雋士及律書算學州縣學各絹一疋皆有酒脯其分束脩三分入博士二分助教又每年國子監所管學生國監試州縣學生當州試並藝業優長者為試官仍長官監試其試者通計一年所授之業口問大義十條得八已上為上得六已上為中得五已下為下𩔖三不及在學九年律生六年不任貢舉者並解退其從縣向州者數下第並須通計服闋重任者不在計限諸博士助教皆分經授每一經必令終講未終不得改業開元二十二年五月勅諸州縣學生二十五已下八品九品子弟若庶人並年二十一已下通一經已上未及一經而精神聰悟有文詞史學者每年銓量舉送所司簡試聽入四門學充俊士即諸州貢人省試下第情願入學者聴國子監所管學生尚書省補州縣學生州縣長官補州縣學生取郭下縣人替諸州縣學生習本業之外仍令兼習吉凶禮公私有禮事令示儀式餘皆不得輒使諸百姓立私學其欲寄州縣學授業者亦聴會昌五年正月勅公卿百寮子弟及京畿内土人寄修明經進士業者並宜𨽻名太學外州寄學及土人並宜𨽻名所在官學永為常制西監元和二年十二月奏兩京諸館學生總六百五十員每館定額如後西京學生五百五十員國子館八十員太學七十四員四門館三百員廣文館六十員律館算館各十員又奏伏見天寶已前國學生其數至多並有員額至永泰後西監置五百五十員東監近置一百員未定每館員額今謹具每館定額如前伏請下禮部准格補置勅㫖依東監東監元和二年十二月勅東都國子監量置學生一百員國子館十員太學十五員四門五十員律館十員廣文館十員書館三員算館二員鄉貢鄉貢里選盛于中古乎今之所稱盖本同而末異也今之解送則古之上計也漢武帝置五經博士博士奉常通古今員數十人漢置五經而已太常選民年十八已上好學者補弟子郡國有好文學敬順于鄉黨者令與計偕授業太常如弟子一歲輒課通經藝補文學掌故上第為郎其秀異等太常以名聞其下才不事學者罷之若等雖舉于鄉亦由于學兩漢之制葢本乎周禮者也有唐貞觀以前兩監之外亦頗重郡府學生然其時亦由鄉里所升直補監生而已爾後膏粱之族率以學校為鄙事若鄉貢盖假名就貢而已景雲之前鄉貢歲二三千人盖用古之鄉貢也咸亨五年七世伯祖鸞臺鳯閣龍石白水公時任考功員外郎下覆試十一人内張守真一人鄉貢開耀二年劉思𤣥下五十一人内雍思泰一人永淳二年劉廷竒下五十五人内元求仁一人光宅元年閏七月二十四日劉廷竒重試一十六人内康廷芝一人長安四年崔湜下四十一人李温玉稱蘇州鄉貢景龍元年李欽讓稱定州鄉貢附學爾來鄉貢漸廣率多寄應者故不甄别于牓中信本同而末異也明矣大厯中楊綰疏請復舊章貴全乎實尋亦寢于公族垂空言而已廣文天寶九年七月詔于國子監别置廣文館以舉常修進士業者斯亦救生徒之離散也始其春官氏擢廣文生者名第無高下貞元八年歐陽詹第三人李觀第五人爾來此𩔖不乏暨大中之末咸通乾符以來率以為末第或曰鄉貢賓也學生主也主宜下于賓故列于後也大順二年孔魯公在相位思矯其弊故特置呉仁璧于蔣肱之上明年公得罪去職及第者復循常而已悲夫兩都貢舉永泰元年始置兩都貢舉禮部侍郎官號皆以知兩都為名每歳兩地别放及第自大厯十一年停東都貢舉是後不置試雜文進士科與雋秀同源異𣲖所試皆答䇿而已兩漢之制有射䇿對䇿二義者何射者謂列䇿于几案貢人以矢投之隨所中而對之也對則明以䇿問授其人而觀其臧否也如公孫𢎞董仲舒皆由此而進者也有唐自高祖至高宗靡不率由舊章垂拱元年呉師道等二十七人及第後勅批云畧觀其䇿並未盡善若依令式及第者唯秪一人意欲廣收其材通三者並許及第後至調露二年考功員外劉思𤣥奏請加試帖經與雜文文之高者放入䇿尋以則天革命事復因循至神龍元年方行三場試故常列詩賦題目于榜中矣朝見國朝舊式天下貢士十一月一日赴朝見長夀二年拾遺劉承之上疏請元日舉人朝見列于方物之前從之見狀臺司接覽中使宣口勅慰諭建中元年十一月朝集使及貢士見于宣政殿兵興以來四方不上計内外不㑹同者二十五年矣今計吏至一百七十三人矣仍令朝集使每日二人待制謁先師開元五年九月詔曰古有賓獻之禮登于天府揚于王庭重學尊師興賢進士能美風俗成教化盖先王之繇焉朕以寡徳欽若前政思與子大夫復臻于理故他日訪道有時忘餐乙夜觀書分宵不寐悟専經之義篤學史之文永懐覃思有足尚者不示褒崇孰云奬勸其諸州鄉貢明經進士見訖宜令引就國子監謁先師學官為之開講質問其義宜令所司優厚設食兩館及監内得舉人亦准其日清資官五品已上及朝集使徃觀禮即為常式易曰學以聚之問以辨之詩曰如切如磋如琢如磨此朕所望于習才也進士歸禮部雋秀等科比皆考功主之開元二十四年李昻員外性剛急不容物以舉人皆飾名求稱揺蕩主司談毁失實竊病之而將革焉集貢士與之約曰文之美惡悉知之矣考校取捨存乎至公如有請託于時求聲于人者當首落之既而昻外舅常與進士李權隣居相善乃舉權于昻昻怒集貢人召權庭數之權謝曰人或猥知竊聞于左右非敢求也昻因曰觀衆君子之文信美矣然古人云瑜不掩瑕忠也其有詞或不典將與衆評之若何皆曰唯公之命既出權謂衆曰向之言其意属我也吾誠不第決矣又何藉焉乃隂求昻瑕以待之異日㑹論昻果斥權章句之疵以辱之權拱手前曰夫禮尚往來來而不往非禮也鄙文不臧既得而聞矣而執事昔有雅什嘗聞于道路愚將切磋可乎昻怒而嘻笑曰有何不可權曰耳臨清渭洗心向白雲閒豈執事之詞乎昻曰然權曰昔唐堯衰耄厭倦天下將禪于許由由惡聞故洗耳今天子春秋鼎盛不揖讓于足下而洗耳何哉是時國家寜謐百寮畏法令兢兢然莫敢跌昻聞惶駭蹶起不知所酬乃訴于執政謂權風狂不遜遂下權吏初昻强愎不受嘱請及是有請求者莫不允從由是廷議以省郎位輕不足以臨多士乃詔禮部侍郎専之矣論曰永徽之後以文儒亨達不由兩監者稀矣于時場籍先兩監而後鄉貢盖以朋友之臧否文藝之優劣切磋琢磨匪朝伊夕抑揚去就與衆共之有如趙邵蕭李趙驊邵軫蕭穎士李華婁郭苑陳婁師徳郭元振苑咸陳子昻靡不名遂功成交全分契洎乎近代厥道寖微玉石不分薫蕕錯雜長我之望殊缺逺方之來亦乖止謂羣居固非瓦合是知生而知之者性也學而知之者習也渾金璞玉又何追琢之勞乎潢汙行潦又何版築之置乎紵衣之獻彼跡疎而道親也畫龍之劾斯面交而心賊也後之進者定交擇友當問道之何如唐摭言卷一
