body:
  text: 唐托言卷三五代王定保撰散序定保生於咸通庚寅歲時屬南蠻騷動諸道徴兵自是聨翩冦亂中土雖舊第太平里而迹未嘗達京師故治平盛事罕得博聞然以樂聞科第之美常咨訪於前達間如丞相吳郡公扆翰林侍郎濮陽公融恩門右省李常侍渥顔夕拜蕘從翁丞相溥從叔南海記室渙其次同年盧十三延讓楊五十一贊圖崔二十七籍若等十許人時蒙言及京華故事靡不録之于心退則編之於簡䇿始以進士宴逰之盛案李肇舍人國史補云曲江大會此為下第舉人其筵席簡率器皿皆隔山拋之屬比之席地幕天殆不相逺爾來漸加侈靡皆為上列所據向之下第舉人不復預矣所以長安逰手之民自相鳩集目之為進士團初則至寡洎大中咸通已來人數頗衆其有何士參者為之酋帥尤善主張筵宴凡今年才過關宴士參已偹來年宴逰之費由是四海之內水陸之珍靡不畢偹時號長安三絶南院主事鄭容中書門官張良佐并士參為三絶團司所由百餘輩各有所主大凡謝後便往期集院團司先於主司宅側稅一大第與新人期集院內供帳宴饌甲於輦轂其日狀元與同年相見後便請一人為録事舊例率以狀元為録事其餘主宴主酒主樂探花主茶之類咸以其日辟之主樂兩人一人主飲妓放榜後大科頭兩人第一部小科頭一人第二部常詰旦至期集院常宴則小科頭主張大宴則大科頭縱無宴席科頭亦逐日請給茶錢平時不以數後每人日五百文第一部樂官科地每日一千第二部五百見燭皆倍科頭皆重分逼曲江大會則先牒教坊請奏上御紫雲樓垂簾觀焉時或擬作樂則為之移日故曹松詩云追逰若遇三清樂行從應妨一日春敕下後人置被袋例以圖障酒器錢絹實其中逢花即飲故張籍詩云無人不惜花園宿到處皆攜酒器行其被袋狀元録事同點檢闕一則罰金曲江之宴行市羅列長安幾於半空公卿家率以其日揀選東牀車馬闐塞莫可殫述洎巢冦之亂不復舊態矣謝恩狀元已下到主司宅門下馬綴行而立斂名紙通呈入門並敘立於階下北上東向主司列席褥東面西向主事揖狀元已下與主司對拜拜訖狀元出行致詞又退著行各拜主司答拜拜訖主事云請諸郎君敘中外狀元已下各各齒敘便謝恩餘人如狀元禮禮訖主事云請狀元曲謝名第第幾人謝衣鉢衣鉢謂得主司名第其或與主司先人同名第即謝衣鉢如踐世科即感泣而謝謝訖即登階狀元與主司對坐于時公卿來看皆南行敘坐飲酒數巡便起赴期集院或云此禮亦不常即有於都省致謝公卿來看或不坐而去三日後又曲謝其日主司方一一言及薦導之處俾其各謝挈維之力茍特達而取亦要言之期集謝恩後方詣期集院大凡敕下已前每日期集兩度詣主司之門然三日後主司堅請已即止同年初到集所團司所由輩參狀元後便參衆郎君拜訖俄有一吏當中庭唱曰諸郎君就坐隻東雙西其日醵罰不少又出抽名紙錢每人十千文其斂名紙見狀元俄於衆中驀抽三五箇便出此錢鋪底一自狀元已下每人三十千文點檢文書狀元録事具啓事取人數主司於其間點請三五人工於八韻五言者或文字乖訛便在點竄矣大約避廟諱御名宰相諱然三十所製分為兩卷以金銅軸頭青縹首進上過堂其日團司先於光範門裏東廊供帳備酒食同年於此候宰相上堂後參見于時主司亦召知聞三兩人會於他處此筵罰錢不少宰相既集堂吏來請名紙生徒隨座主過中書宰相橫行在都堂門裏敘立堂吏通云禮部某姓侍郎領新及第進士見相公俄有一吏抗聲出主司乃登階長揖而退立於門側東向然後狀元已下敘立於階上狀元出行致詞云今月日禮部放榜某等幸忝成名獲在相公陶鑄之下不任感懼在左右下即云慶懼言訖退揖乃自狀元已下一一自稱姓名稱訖堂吏云無客主司復長揖領生徒退詣舍人院主司襴簡舍人公服靸鞋延接主司然舍人禮貌謹敬有加隨事敘杯酒後於階前鋪席褥請舍人登席諸生皆拜舍人答拜狀元出行致詞又拜答拜如初便出於廊下候主司出一揖而已當時詣宅謝恩便致飲席關試吏部員外其日於南省試判兩節諸生謝恩其日稱門生謂之一日門生自此方屬吏部矣宴名大相識主司在具慶次相識主司在偏侍小相識主司有兄弟聞喜敕士宴櫻桃月燈打毬牡丹看佛牙每人二千以上佛牙樓寶夀亭定水莊嚴皆有之寶夀量成佛牙用水精函子盛銀菩薩捧之然得一僧跪捧菩薩多是僧録或首座方得捧之矣關宴此最大宴亦謂之離筵備述于前矣今年及第明年登科郭代公十八擢第其年冬制入高等何扶太和九年及第明年捷三篇因以一絶寄舊同年曰金榜題名墨尚新今年依舊去年春花間每被紅粧問何事重來只一人慈恩寺題名逰賞賦詠雜紀進士題名自神龍之後過關宴後率皆期集於慈恩塔下題名故貞元中劉太真侍郎試慈恩寺望杏園花發詩會昌三年贊皇公為上相其年十一月十九日敕諫議大夫陳商守本官權知貢舉後因奏對不稱旨十二月十七日宰臣遂奏依前命左僕射兼太常卿王起主文二十二日中書復奏奉宣旨不欲令及第進士呼有司為座主趨附其門兼題名局席等條疏進來者伏以國家設文學之科求貞正之士所宜行敦風俗義本君親然後申於朝廷必為國器豈可懷賞拔之私惠忘教化之根源自謂門生遂成膠固所以時風寖薄臣節何施樹黨背公靡不由此臣等商量今日已後進士及第任一度參見有司向後不得聚集𠫭謁及於有司宅置宴其曲江大會朝官及題名局席並望勒停緣初獲美名實皆少雋既遇春節難阻良逰三五人自為宴樂並無所禁唯不得聚集同年進士廣為宴會仍委御史臺察訪聞奏謹具如前奉敕宜依於是向之題名各盡削去蓋贊皇公不由科第故設法以排之洎公失意悉復舊態曲江逰賞雖云自神龍以來然盛於開元之末何以知之案實録天寶元年敕以太子太師蕭嵩私廟逼近曲江因上表請移他處敕令將士為嵩營造嵩上表謝仍讓令將士創造敕批云卿立廟之時此地間僻今傍江修築舉國勝逰與卿思之深避喧雜事資改作遂命官司承已拆除終須結搆已有處分無假致辭蕭穎士開元二十三年及第恃才傲物敻無與比常自攜一壺逐勝郊野偶憩于逆旅獨酌獨吟會風雨暴至有紫衣老父領一小僮避雨於此穎士見其散冗頗肆凌侮逡巡風定雨霽車馬卒至老父上馬呵殿而去穎士倉忙覘之左右曰吏部王尚書也穎士常造門未之面極所驚愕明日具長箋造門謝尚書命引至廡下坐而責之且曰所恨與子非親屬當庭訓之耳復曰子負文學之名踞忽如此止於一第乎後穎士終於揚州功曹小歸尚書榜裴起部與邠之李摶先輩舊友摶以詩賀廷裕曰銅梁千里曙雲開仙籍新從紫府來天上已張新羽翼世間無復舊塵埃嘉禎果中君平卜賀喜須斟卓氏杯應笑戎藩刀筆吏至今泥滓曝魚腮既而復以二十八字謔之曰曾隨流水化凡鱗安上門前一字新聞道蜀江風景好不知何似杏園春裴有六韻答曰何勞問我成都事亦報君知便納降蜀栁籠堤煙矗矗海棠當户燕雙雙富春不並窮師子濯錦全勝旱曲江高卷絳紗揚氏宅時主文寓揚子巷故有此句半垂紅袖薛濤窗浣花泛鷁詩千首靜衆尋梅酒百缸若説絃歌與風景主人兼是碧油幢太和二年崔郾侍郎東都放榜西都過堂杜牧有詩曰東都放榜未花開三十三人走馬回秦地少年多釀酒却將春色入關來胡證尚書質狀魁偉膂力絶人與裴晉公度同年度嘗狎逰為兩軍力人十許輩凌轢勢甚危窘度潛遣一介求救於證證衣皂貂金帶突門而入諸力士睨之失色證飲後到酒一舉三鍾不啻數升杯盤無餘瀝逡巡主人上燈證起取鐵燈臺摘去枝葉而合其跗橫置膝上謂衆人曰鄙夫請非次改令凡三鍾引滿一遍三臺酒須盡仍不得有滴瀝犯令者一鐵躋自謂燈臺證復一舉三鍾次及一角抵者凡三臺三遍酒未能盡淋漓逮至並座證舉躋將擊之羣惡皆起設拜叩頭乞命呼為神人證曰鼠輩敢爾乞汝殘命叱之令去崔沆及第年為主罰録事同年盧彖俯近關宴堅請假往洛下拜慶既而淹緩久之及同年宴於曲江亭子彖以雕幰載妓微服嚲鞚縱觀於側遽為團司所發沆判之略曰深攙席帽密映氊車紫陌尋春便隔同年之面青雲得路可知異日之心咸通中進士及第過堂後便以騾從車服侈靡之極稍不中式則重加罰金蔣泳以故相之子少年擢第時家君任太常卿語泳曰爾門緒孤微不宜從世祿所為可先納罰錢慎勿以騾從也盧文煥光化二年狀元及第頗以宴醵為急務常俯關宴同年皆患貧無以致之一旦紿以逰齊國公亭子既至皆解帶從容文煥命團司牽驢時栁璨告文煥以驢從非已有文煥曰藥不瞑眩厥疾弗瘳璨甚銜之居四年璨登庸文煥憂戚日加璨每遇之曰藥不瞑眩厥疾弗瘳曲江亭子安史未亂前諸司皆列於岸滸幸蜀之後皆燼於兵火矣所存者唯尚書省亭子而已進士關宴常寄其間既徹饌則移樂泛舟率為常例宴前數日行市駢闐於江頭其日公卿家傾城縱觀於此有若中東床之選者十八九鈿車珠鞍櫛比而至或曰乾符中薛能尚書為大京兆楊知至侍郎將攜家人遊致書於能假舫子先是舫子己為新人所假能答書云己為三十子之鳩居矣知至得書怒曰昨日郎吏敢此無禮能自吏部郎中拜京兆少尹權知大尹開成五年樂和李公榜于時上在諒暗故新人逰賞率常雅飲詩人趙嘏寄贈曰天上髙髙月桂叢分明三十一枝風滿懷春色向人動遮路亂花迎馬紅鶴馭逈飄雲雨外蘭亭不在管絃中居然自是前賢事何必青樓倚翠空寶厯年中楊嗣復相公具慶下繼放兩榜時先僕射自東洛入覲嗣復率生徒迎于潼關既而大宴于新昌里第僕射與所執坐于正寢公領諸生翼坐于兩序時元白俱在皆賦詩於席上唯刑部楊汝士侍郎詩後成元白覽之失色詩曰隔坐應須賜御屏盡將仙翰入高𡨕文章舊價留鸞掖桃李新隂在鯉庭再歲生徒陳賀宴一時良史盡傳馨當年疏傳雖云盛詎有兹筵醉醁􅌬汝士其日大醉歸謂子弟曰我今日壓倒元白大順中王渙自左史拜考功員外同年李德鄰自右史拜小戎趙光胤自補衮拜小儀王拯自小版拜少勳渙首唱長句感恩上裴公曰青襟七十榜三年建禮含香次第遷珠彩乍連星錯落桂花曽到月嬋娟玉經磨琢多成器劍拔沈埋便倚天應念銜恩最深者春來為夀拜尊前裴公答曰謬持文柄得時賢粉署清華次第遷昔歲䇿名皆健筆今朝稱職并同年各懷器業寧推讓俱上青霄豈後先何事老來猶賦詠欲將酬和永留傳王起於會昌中放第二榜內道場詩僧廣宣以詩寄賀曰從辭鳯閣掌絲綸便向青雲領貢賓再闢文場無枉路兩開金榜絶寃人眼看龍化門前水手放鶯飛谷口春明日定歸台席去鶺鴒原上共陶鈞起答曰延英面奉入青闈亦選功夫亦選竒在冶只求金不耗用心空學稱無私龍門變化人皆望鶯谷飛鳴自有時獨喜向公誰是證彌天上士與新詩周墀任華州刺史武宗會昌三年王起僕射再主文柄墀以詩寄賀并序曰僕射十一叔以文學德行當代推高在長慶之間春闈主貢採托孤進至今稱之近者朝廷以文柄重難將抑浮華詳明典實由是復委前務三領貢籍迄今二十二年于兹亦縉紳儒林罕有如此之盛况新榜既至衆口稱公墀忝沐深恩喜陪諸彥因成七言四韻詩一首輒敢寄獻用導下情兼呈新及第進士文場三化魯儒生二十餘年振重名曾忝木雞誇羽翼又陪金馬入蓬瀛墀初年木雞賦及第嘗陪僕射守職內廷雖欣月桂居先折更羡春蘭最後榮欲到龍門看風水關防不許暫離營時諸進士皆賀起答曰貢院離來二十霜誰知更忝主文場楊葉縱能穿舊的桂枝何必愛新香九重每憶同仙禁六義初吟得夜光莫道相知不相見蓮峯之下欲徴黃王起門生一榜二十二人和周墀詩嵩髙降德為時生洪筆三題造化名鳯詔佇歸専北極驪珠搜得盡東瀛褒衣已換金章貴禁掖曾隨玉樹榮明日定知同相印青襟新列栁間營盧肇字子發公心獨立副天心三轄春闈冠古今蘭署門生皆入室蓮峯太守别知音同升翰苑時名重遍立朝端主意深新有受恩江海客坐聽朝夕繼為霖丁稜字子威三年竭力向春闈塞斷浮華衆路岐盛選棟梁稱昔日平均雨露及明時登龍舊美無斜徑折桂新榮盡直枝莫道只陪金馬貴相期更在鳯凰池姚鵠字居雲昔年桃李已滋榮今日蘭蓀又發生葑菲採時皆有道權衡分處且無情叨陪鵷鷺朝天客共作門闌出谷鶯何事感恩偏覺重忽聞金榜扣柴荆退之自顧微劣始不敢以叨竊是望䇿試之後遂歸盩厔山居不期一旦進士團遣人賫榜扣關相報方知忝幸矣高退之字遵聖當年門下化龍成今日餘波進後生仙籍共知推麗則禁垣同得薦嘉名桃溪蚤茂誇新蕚菊圃初開耀晚英誰料羽毛方出谷許教齊和九皋鳴孟球字庭玉孔門頻建鑄顔功紫綬青襟感激同一簣勤勞成太華三年恩德重維嵩楊隨前輩穿皆中桂許平人折欲空慙和周郎應見顧感知大造意無窮劉耕字遵益常將公道選羣生猶被春闈屈重名文柄久持殊歲紀恩門三啓動寰瀛雲霄幸接鴛鸞盛變化欣同草木榮乍得陽和如細栁參差長近亞夫營裴翻字雲章滿朝簮紱半門生又見新書甲乙名孤進自今開道路至公依舊振寰瀛雲飛太華清詞著花發長安白屋榮忝受恩光同上客唯將報德是經營樊驤字彥龍滿朝朱紫半門生新榜勞人又得名國器舊知收片玉朝宗轉覺集登瀛同升翰苑三年美繼入花源九族榮共仰蓮峯聽雪唱欲賡仙曲意怔營崔軒字鳴岡一振聲華入紫微三開秦鏡照春闈龍門舊列金章貴鶯谷新遷碧落飛恩感風雷皆變化詩裁錦繡借光輝誰知散質多榮忝鵷鷺清塵接布衣蒯希逸字太隱龍門一變荷生成况是三傳不朽名美譽蚤聞喧北闕頽波今見走東瀛鵷行既接參差影雞樹仍同次第榮從此青襟與朱紫升堂侍宴更何營林滋字後象恩光忽逐曉春生金榜前頭忝姓名三感至公禆造化重揚文德振寰瀛佇為霖雨曽相賀半在雲霄覺更榮何處新詩添照灼碧蓮峯下栁間營李仙古字垂後二十二年文教主三千上士滿皇州獨陪宣父蓬瀛奏方接顔生魯衛遊多羡龍門齊變化屢看雞樹第名流升堂何處最榮美朱紫環樽幾獻酬黃頗字無頗三開文鏡繼芳聲暗接雲霄接去程曾壓洪波先得路蚤升清禁共垂名蓮峯對處朱輪賁金榜傳時玉韻成更許下才聽白雪一枝今過郤詵榮張道符字夢錫常將公道選諸生不是鵷鴻不得名天上宴回聮步武禁中麻出滿寰瀛簮裾盡過前賢貴門館仍叨後學榮看著鳯池相繼入都堂那肯滯關營丘上卿字陪之重德由來為國生五朝清顯冠公卿風波久佇濟川楫羽翼三遷出谷鶯絳帳青襟同日貴春蘭秋菊異時榮孔門弟子皆賢哲誰料窮儒忝一名石貫字總之文學宗師心稱平無私三用佐貞明恩波舊是仙舟客德宇新添月桂名蘭署崇資金印重蓮峯髙唱玉音清羽毛方荷生成力難繼鸞凰上漢聲李潛字德隱科文又主守初時光顯門生濟會期美擅東堂登甲乙榮同內署待恩私羣鶯共喜新遷木雙鳯皆當即入池别有倍深知感士曾經兩度得芳枝孟寧字處中儒雅皆傳德教行幾敦浮俗贊文明龍門昔上波濤逺禁署同登渥澤榮虛散謬當陪杞梓後先寧異感生成時方側席徴賢急况説歌謠近帝京唐思言字子文聖朝文德最推賢自古儒生少比肩再啓龍門將二紀兩司鶯谷已三年蓬山皆美齊榮貴金榜誰知忝後先正是感恩流涕日但思旌斾碧峯前左牢字德膠春闈帝念主生成長慶公聞兩歲名有詔赤心同雨露無私和氣浹寰瀛龍門乍出難勝幸鵷侣先行是最榮遙仰髙峯看白雪多慙屬和意屏營王甚夷字無黨長慶曾收間世英早居臺閣冠公卿天書再受恩波逺金榜三開日月明已見差肩趨翰苑更期聮步掌台衡小儒謬迹雲霄路心仰蓮峯望太清金厚載字化光曹汾尚書鎮許下其子希幹及第用錢二十萬榜至鎮開賀宴日張之於側時進士胡錡有啓賀略曰桂枝折處著萊子之綵衣楊葉穿時用魯連之舊箭汾之名第同故也又曰一千里外觀上國之風光十萬軍前展長安之春色楊汝士尚書鎮東川其子知溫及第汝士開家宴相賀營妓咸集汝士命人與紅綾一匹詩曰郎君得意及青春蜀國將軍又不貧一曲髙歌紅一匹兩頭娘子謝夫人華州榜薛侍郎諸門生詩曰時君過聽委平衡粉署華燈到曉明開卷固難窺浩汗執心空欲慕公平機雲筆舌臨文健沈宋篇章發韻清自笑觀光渾昨日披心爭不愧羣生盧相國鈞初及第頗窘於率費俄有一僕願為月傭服飾鮮潔謹幹不與常等覩鈞褊乏往往有所資時俯及關宴鈞未辦醵率撓形於色僕輒請罪鈞具以實告對曰極細事耳郎君可以處分最先後勾當何事鈞初疑其妄既而將覘之紿謂之曰爾若有伎吾當主宴第一要一大第為備宴之所次則徐圖其僕唯而去頃刻乃回白鈞曰已稅得宅矣請幾郎檢校翌日鈞強往看之既而朱門甲第擬于宫禁鈞不覺欣然復謂曰宴處即大如法此尤不易張陳對曰但請選日啓聞侍郎張陳某請専掌鈞始慮其非反覆詰問但微笑不對或意其非常人亦不固於猜疑既宴除之日鈞止于是俄觀幕帟茵毯華煥無比此外松竹花卉皆稱是鈞之醵率畢至由是公卿間靡不誇詫詰朝其僕請假給還諸色假借什物因之一去不返逮旬日鈞異其事馳往舊遊訪之則向之花竹一無所有但見頽垣壞棟而已議者以鈞之仁感通神明故為曲贊一春之盛而成此終身之美盧肅鈞之孫貞簡有祖風光化初華州行在及第洎大冦犯闕二十年搢紳靡不褊乏肅始登第俄有李鴻者造之願傭力鴻以錐刀暇日往往反資於肅此外未嘗以所須為意肅有舊業在南陽常令鴻徴租皆如期而至往來千里而未嘗侵費一金既及第鴻奔走如初及一春事畢鴻即辭去新進士尤重櫻桃宴乾符四年永寧劉公第二子覃及第時公以故相鎮淮南敕邸吏日以銀一鋌資覃醵罰而覃所費往往數倍邸吏以聞公命取足而已會時及薦新狀元方議醵率覃潛遣人厚以金帛預購數十石矣于是獨置是宴大會公卿時京國櫻桃初出雖貴達未適口而覃山積鋪席復和以糖酪者人享蠻榼一小盎亦不啻數升以至參御輩靡不霑足羅玠貞元五年及第關宴曲江泛舟舟沈玠以溺死後有關試前卒者謂之報羅宣慈寺門子不記姓氏酌其人義俠之徒也咸通十四年韋昭範先輩登第昭範乃度支侍郎楊嚴懿親宴席間帟幕器皿之髏皆假于計司楊公復遣以使庫供借其年三月中宴於曲江亭供帳之盛罕有倫擬時飲興方酣俄覩一少年跨驢而至驕悖之狀旁若無人於是俯逼筵席長耳引頸及肩復以巨箠振築佐酒謔浪之詞所不忍聆諸君子駭􅌓之際忽有於衆中批其頰者隨手而墜於是連加毆擊復奪所執箠箠之百餘衆皆致怒瓦礫亂下殆將斃矣當此之際紫雲閣門軋開有紫衣從人數輩馳告曰莫打莫打傳呼之聲相續又一中貴驅殿甚盛馳馬來救門子乃􅋵箠迎擊中者無不面仆於地敕使亦為所箠既而奔馬而返左右從而俱入門亦隨閉而已座內甚欣愧然不測其來仍慮事連宫禁禍不旋踵乃以緡錢束素召行驅者訊之曰爾何人與諸郎君誰素而能相為如此對曰某是宣慈寺門子亦與諸郎君無素第不平其下人無禮耳衆皆嘉嘆悉以錢帛遺之復相謂曰此人必須亡去不則當為擒矣後旬朔座中賓客多有假途宣慈寺門者門子皆能識之靡不加敬竟不聞有追問之者裴思謙狀元及第後作紅箋名紙十數詣平康里因宿於里中詰旦賦詩曰銀釭斜背解鳴璫小語偷聲賀玉郎從此不知蘭麝貴夜來新惹桂枝香鄭合敬先輩及第後宿平康里詩曰春來無處不間行楚閏相看别有情好是五更殘酒醒時時聞喚狀頭聲楚娘閏娘妓之尤者盧肇袁州宜春人與同郡黃頗齊名頗富於産肇幼貧乏與頗赴舉同日遵路郡牧於離亭餞頗而已時樂作酒酣肇䇿蹇郵亭側而過出郭十餘里駐程俟頗為侣明年肇狀元及第而歸刺史以下接之大慙恚會延肇看競渡於席上賦詩曰向道是龍剛不信果然銜得錦標歸錦標船頭所得薛監晚年厄於宦途嘗䇿羸赴朝值新進士榜下綴行而出時進士團所由輩數十人見逢行李蕭條前導曰回避新郎君逢囅然即遣一介語之曰報道莫貧相阿婆三五少年時也曾東塗西抹來許晝者睢陽人也薄攻五字詩天復四年大駕東幸駐驆甘棠晝於此際及第梁太祖長子號大卿郎君者常與晝屬和晝以卿為奧主隨駕至洛下攜同年數人醉於梁祖私第因折牡丹十許朵主吏前白云凡此花開落皆籍其數申令公秀才奈何恣意攀折晝慢罵久之主吏銜之潛遣一介馳報梁祖梁祖聞之頗睚眥獨命械晝而獻于時大卿竊知間道先遣使至晝遂亡命河北莫知所之鄭光業新及第年宴次有子女卒患心痛而死同年皆惶駭光業撤筵中器物悉授其母别徴酒器盡歡而罷乾符四年諸先輩月燈閣打毬之會時同年悉集無何為兩軍打毬軍將數輩私較於是新人排比既盛勉強遲留用抑其鋭劉覃謂同年曰僕能為羣公小挫彼驕必令解去如何狀元已下應聲請之覃因跨馬執杖躍而揖之曰新進士劉覃擬陪奉可乎諸輩皆喜覃驟馳擊拂風驅雷逝彼皆􅌓視俄䇿得毬子向空磔之莫知所在數輩慙沮僶俯而去時閣下數千人因之大呼笑久而方止咸通十三年三月新進士集於月燈閣為蹙鞠之會擊拂既罷痛飲于佛閣之上四面看棚櫛比悉皆褰去帷箔而縱觀焉先是飲席未合同年相與循檻肆覽鄒希回者年七十餘榜末及第時同年將欲即席希回堅請更一巡厯衆皆笑或謔之曰彼亦何敢望回大中十年鄭皓都尉放榜請假往東洛覲省生徒餞於長樂驛俄有紀于屋壁曰三十驊騮一烘塵來時不鎖杏園春楊花滿地如飛雪應有偷逰曲水人乾符丁酉歲關宴甲於常年有溫定者久困場屋坦率自恣尤憤時之浮薄設竒以侮之至其日蒙衣肩輿金翠之飾敻出于衆侍婢皆稱是徘徊於栁隂之下俄頃諸公自露棚移樂登鷁首既而謂是豪貴其中姝麗因遣促舟而進莫不注視於此或肆調謔不已羣興方酣定乃於簾間垂足定膝脛偉而毳衆忽覩之皆掩袂亟命迥回舟避之或曰此必溫定矣乾寧末駕幸三峯太子太師盧知猷於西溪亭子赴進士關宴因謂前達曰老夫似這關宴至今相繼赴三十箇矣李嶢及第在偏侍下俯逼起居宴霖雨不止遣賃油幕以張去之嶢先人舊廬升平里凡用錢七百緡自所居連亘通衢殆及一里餘參御輩不啻千餘人韉馬車輿闐咽門巷來往無有霑濕者而金碧照耀頗有嘉致嶢時為丞相韋都尉所委干預政事號為李八郎其妻又南海韋宙女宙常資之金帛不可勝紀神龍已來杏園宴後皆於慈恩寺塔下題名同年中推一善書者紀之他時有將相則朱書之及第後知聞或遇未及第時題名處則為添前字或詩曰曽題名處添前字送出城人乞舊詩苖台符六歲能屬文聰悟無比十餘歲博覽羣籍著皇心三十卷年十六及第張讀亦幼擅詞賦年十八及第同年進士同佐鄭薰少師宣州幕二人嘗列題於西明寺之東廡或竊注之曰一雙前進士兩箇阿孩兒台符十七不祿讀位至正卿李湯題名於昭應縣樓韋蟾覩之走筆留謔曰渭水秦川拂眼明希仁何事寡詩情只因學得虞姬壻書字才能記姓名裴晉公赴敵淮西題名華嶽之闕門大順中户部侍郎司空圖以一絶紀之曰嶽前大隊赴淮西從此中原息戰鞞石闕莫教苔蘚上分明認取晉公題白樂天一舉及第詩曰慈恩塔下題名處十七人中最少年樂天時年二十七省試性習相近逺賦玉水記方流詩攜之謁李涼公逢吉公時為校書郎于時將他適白遽造之逢吉行攜行看初不以為意及覽賦頭曰噫下自人上達君咸德以慎立而性由習分逢吉大竒之遂寫二十餘本其日十七本都出論曰科第之設沿革多矣文皇帝撥亂反正特盛科名志在牢籠英彥邇來林栖谷隱櫛比鱗差美給華資非第勿處雄藩劇郡非第勿居斯乃名實相符亨達自任得以惟聖作則為官擇人有其才者靡捐於甕牖繩樞無其才者詎繫於王孫公子莫不理推畫一時契大同垂三百年擢士衆矣然此科近代所美知其美之所美者在乎端已直躬守而勿失昧其美之所美者在乎貪名巧宦得之為榮噫大聖設科以廣其教奈何昧道由徑未旋踵而身名俱泯又何科第之庇乎矧諸尋芳逐勝結友定交競車服之鮮華騁杯盤之意氣沽激價譽比周行藏始膠漆於羣強終短長於逐末乃知得失之道坦然明白邱明所謂求名而亡欲蓋而彰茍有其實又何科第之闕歟唐托言卷三
