body:
  text: 唐摭言卷五五代王定保撰切磋大居守李相讀春秋誤呼叔孫婼勅畧為婼勅晷日讀一卷有小吏侍側常有不懌之色公惟問之爾常讀此書耶曰然胡為聞我讀至此而數色沮耶吏再拜言曰縁某師授誤呼文字今聞相公呼婼勅畧為婼勅晷方悟耳公曰不然吾未之師也自撿釋文而讀必誤在我非在爾也因以釋文示之葢書字以田加各首久而成日配咎為晷小吏因委曲言之公大慙媿命小吏受北面之禮號為一字師韓文公著毛穎𫝊好博簺之戲張水部以書勸之凡三書其一曰比見執事多尚駁雜無實之說使人陳之於前以為歡此有累於令徳又高論之際或不容人之短如任私尚勝者亦有所累也先王存六藝自有常矣有徳者不為猶不為損况為博簺之戲與人競財乎君子固不為也今執事為之以廢棄時日籍實不識其然文公答曰吾子譏吾與人言無實駁雜之説此吾所以為戲耳比之酒色不有間乎吾子譏之似同浴而譏裸體也若高論不能下氣或似有之當更思而悔之耳博簺之譏敢不承教其他俟相見羊紹素夏課有畫狗馬難為功賦其實取畫狗馬難于畫鬼神之意也投表兄呉子華子華覽之謂紹素曰吾子此賦未嘉賦題無鬼神而賦中言鬼神子盍為畫狗馬難於畫鬼神賦即善矣紹素未及改易子華一夕成於腹笥有進士韋彖池州九華人始以賦卷謁子華子華聞之甚喜彖居數日貢一篇于子華其破題曰有丹青二人一則矜能於狗馬一則誇妙于鬼神子華大竒之遂焚所著而紹素竟不能以已下之其年子華為彖取府解陳嶠謁安陸鄭郎中諴三年方一見諴從容謂嶠曰識閔廷言否嶠曰偶未知聞諴曰不妨與之還往其人文似西漢呉融廣明中和之際久負屈聲雖未擢科第同人多贄謁之如先達有王圖工詞賦投卷凡旬月融既見之殊不言圖之臧否但問圖曰更曾得盧休信否何堅臥不起惜哉融所得不如也休圖之中表長于八韻向與子華同硯席晚年抛廢歸鏡中别墅李翺與陸傪書李觀之文章如此官止于太子校書年止于二十九雖有名於時俗其卒深知其至者果誰哉信乎天地鬼神之無情于善人而不罰罪也甚矣為善者將安所歸乎翺書其人贈于兄贈于兄盖思君子之知我也予與觀平生不得往來及其死也則見其文嘗歎使李觀若永年則不逺于揚子雲矣書巳之文次忽然若觀之文亦見于今也故書苦雨賦綴於前當下筆時復得詠其文則觀也雖不永年亦不甚逺於揚子雲矣書苦雨之詞既又思我友韓愈非兹世之文古之文也非兹世之人古之人也其詞奥其意適則孟軻既沒亦不見有過於斯者當下筆時如他人疾書之寫誦之不是過也其詞乃能如此常書一章曰獲麟解其他亦可以𩔖知也窮愁不能無述適有書寄弟正辭及其終亦自覺不甚下尋常之所為者亦以贈焉亦唯讀觀愈之詞冀一詳焉翺再拜李元賓與弟書曰年不甚幼近學何書擬應明經為復有文明經世𫝊不可墜也文貴天成强不髙也二事並良茍事立汝擇處焉景福中江西節度使鍾傅遣僧從約進法華經一千部上待之恩渥有加宣從約入内賜齋面賜紫衣一副將行太常博士戴司顔以詩贈行畧曰逺來朝鳯闕歸去戀元侯時呉子華任中諫司顔仰公之名志在属和以為從約之資融覽之撫掌大笑曰遮阿師更不要見便把拽出得其承奉如此矣皇甫湜答李生二書第一書辱書適曛黑使者立復不果一二承來意之厚𫝊曰言及而不言失人粗書其愚為足下答幸察來書所謂今之工文或先於竒怪者顧其文工與否耳夫意新則異於常異於常則怪矣詞髙則出于衆出衆則竒矣虎豹之文不得不炳於犬羊鸞鳯之音不得不鏘于烏鵲金玉之光不得不炫于瓦石非有意先之也迺自然也必崔巍然後為岳必滔天然後為海明堂之棟必撓雲霓驪龍之珠必固深泉足下少年氣盛固當以出拔為意學文之初且未自盡其才何遽稱力不能哉圖王不成其弊猶可以霸其僅自見也將不勝弊矣孔子譏其身不能者幸勉而思進之也來書所謂浮豔聲病之文恥不為者雖誠可恥但慮足下方今不爾且不能自信其言也向者足下舉進士舉進士者有司髙張科格每歲聚者試之其所取迺足下所不為者也工欲善其事必先利其器足下方伐柯而捨其斧可乎哉恥之不當求也求而恥之惑也今吾子求之矣是徒涉而恥濡足也寜能自信其言哉來書所謂急急於立法寜人者迺在位之事聖人得勢所施為也非詩賦之任也功既成澤既流詠歌紀述光揚之作作焉聖人不得勢方以文詞行於後今吾子始學未仕而急其事亦太蚤計矣凡來書所謂數者似言之未稱思之或過其餘則皆善矣既承嘉恵敢自固昧聊復所為俟見方盡湜再拜皇甫湜與李生第二書湜白生之書詞甚多志氣甚横流論説文章不可謂無意若僕愚且困迺生詞競于此固非宜雖然惡言無從不可不卒勿怪夫謂之竒則非正矣然亦無傷于正也謂之竒即非常矣非常者謂不如常乃出常也無傷于正而出於常雖尚之亦可也此統論竒之體耳未以言文之失也夫文者非它言之華者也其用在通理而已固不務竒然亦無傷于竒也使文竒而理正是尤難也生意便其易者乎夫言亦可以通理矣而以文為貴者非他文則逺無文即不逺也以非常之文通至正之理是所以不朽也生何嫉之深耶夫繪事後素既謂之文豈茍簡而已哉聖人之文其難及也作春秋㳺夏之徒不能措一詞吾何敢擬議之哉秦漢以來至今文學之盛莫如屈原宋玉李斯司馬遷相如揚雄之徒其文皆竒其傳皆逺生書文亦善矣比之數子似猶未勝何必心之高乎𫝊曰其言之不出恥躬之不逮也生自視何如哉書之文不竒易之文可為竒矣豈礙理傷聖乎如龍戰於野其血𤣥黃見豕負塗載鬼一車突如其來如焚如死如棄如此何等語也生輕宋玉而稱仲尼班馬相如為文章案司馬遷𫝊屈原曰雖與日月争光可矣生當見之乎若相如之徒即祖習不暇者也豈生稱誤耶將識分有所至極耶將彼之所立卓爾非强為所庶幾遂讎嫉之耶其何傷於日月乎生笑紫貝闕兮珠宫此與詩之金玉其相何異天下人有金玉為之質者乎披薜茘兮帶女蘿此與贈之以芍藥何異文章不當如此説也豈謂怒三四而喜四三識出之白而狺入之黑乎生云虎豹之文非竒夫長本非長短形之則長矣虎豹之形於犬羊故不得不竒也他皆倣此生云自然者非性不知天下何物非自然乎生又云物與文學不相侔此喻也凡喻必以非𩔖豈可以彈喻彈乎是不根者也生稱以知難而退為謙夫蕪難而退謙也知難而退宜也非謙也豈可見黄門而稱貞哉生以一詩一賦為非文章抑不知一之少便非文章耶直詩賦不是文章耶如詩賦非文章三百篇可燒矣如少非文章湯之盤銘是何物也孔子曰先行其言既為甲賦矣不得稱不作聲病文也孔子云必也正名乎生既不以一第為事不當以進士冠姓名也夫煥乎郁郁乎之文謂制度非止文詞也前者捧卷軸而來又以浮豔聲病為説似商量文詞當與制度之文異日言也近風偷薄進士尤甚迺至有一謙三十年之説争為虚張以相髙自謾詩未有劉長卿一句已呼阮籍為老兵矣筆語未有駱賓王一字已罵宋玉為罪人矣書字未識偏旁髙談稷契讀書未知句度下視服鄭此時之大病皆當嫉者生美才勿似之也𫝊曰唯善人能受盡言孔子曰君子無所争必也射乎問於湜者多矣以生之有心也聊有復不能盡不宣湜再拜以其人不稱才試而後驚韓文公皇甫補闕見李長吉時年七歲二公不之信因面試髙軒過一篇蔣凝咸通中詞賦絶倫隨計塗次漢南謁相國徐公公見其人么麽不信有其才因試峴山懐古一篇凝於客位賦成公大竒之令狐文公鎮三峯時及秋賦特置五場試第一場雜文第二場試歌篇第三場表檄先是盧𢎞正一人就試來者皆慄縮而退馬植以將家子弟求薦文公與從事皆鄙之専令人伺其詞句既而試登山採珠賦曰文豹且異於驪龍採斯疎矣白石又殊於老蚌剖莫得之衆皆大驚遂奪𢎞正解元矣黎逢氣貌山野及第年初場後至便於簾前設席主司異之誚其生疎必謂文詞稱是専令人伺之句句來報初聞云何人徘徊曰亦是常言既而將及數聨莫不驚歎遂擢為狀元王勃著滕王閣序時年十四都督閻公不之信勃雖在座而閻公意属子壻孟學士者為之已宿構矣及以紙筆延讓賓客勃不辭讓公大怒拂衣而起専令人伺其下筆第一報云南昌故郡洪都新府公曰亦是老生常談又報云星分翼軫地接衡廬公聞之沈吟不言又云落霞與孤鶩齊飛秋水共長天一色公矍然而起曰此真天才當垂不朽矣遂亟請宴所極歡而罷論曰書云人無常師主善為師於戲近世浮薄率皆貴彼生知恥乎下學質疑問禮者先懐愧色深微賾奥者翻汨沈流風教頽圮莫甚於此由是李華自曰師於茂挺李翺亦曰請益退之于時名遂功成才髙位顯務乎矯俗以遏崩波盛則盛矣方之繆公以小吏一言北面而師之者可謂曠古一人而已有若考覈詞藝之臧否振舉後生之行藏非唯立賢所謂報國噫今之論者信僥倖之賊歟唐摭言卷五
